<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>◈ CORRELdiary</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:#0d1420;}
  ::-webkit-scrollbar-thumb{background:#2a3a55;}
  body{background:#080c12;color:#c8d4e8;font-family:'JetBrains Mono','Fira Mono','Courier New',monospace;font-size:13px;min-height:100vh;}

  /* ── HEADER ─────────────────────────────────────────── */
  .header{border-bottom:1px solid #1a2535;padding:16px 24px 0;position:sticky;top:0;background:#080c12;z-index:10;}
  .header-top{display:flex;align-items:baseline;gap:16px;margin-bottom:12px;flex-wrap:wrap;}
  .logo{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:#00d4ff;letter-spacing:-0.02em;}
  .subtitle{color:#2a3a55;font-size:11px;}
  .stats{margin-left:auto;color:#2a3a55;font-size:11px;}
  .nav{display:flex;gap:2px;}
  .nav-btn{background:none;border:none;cursor:pointer;padding:8px 18px;font-family:inherit;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#4a6080;transition:all 0.2s;border-bottom:2px solid transparent;}
  .nav-btn.active{color:#00d4ff;border-bottom-color:#00d4ff;}
  .nav-btn:hover{color:#a0c4e0;}

  /* ── MAIN ───────────────────────────────────────────── */
  .main{max-width:900px;margin:0 auto;padding:24px 20px;}
  .section-label{color:#2a4060;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}

  /* ── LOG INPUTS ─────────────────────────────────────── */
  .input-row{display:flex;gap:10px;margin-bottom:10px;}
  .input-field{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:#e0eaf8;font-family:inherit;font-size:13px;padding:10px 14px;width:100%;outline:none;transition:border-color 0.2s;}
  .input-field:focus{border-color:#00aaff;}
  .log-btn{background:#003d6b;border:1px solid #0077cc;color:#7dd3fc;font-family:inherit;font-size:12px;letter-spacing:0.08em;padding:10px 22px;border-radius:3px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .log-btn:hover{background:#005099;}
  .log-btn.flash{background:#007744;border-color:#00ff9d;color:#00ff9d;}

  /* ── CHIPS / PILLS ──────────────────────────────────── */
  .chips{margin-bottom:24px;}
  .suggest-chip{display:inline-block;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:2px;padding:2px 8px;margin:2px;font-size:11px;color:#556a85;cursor:pointer;transition:all 0.15s;}
  .suggest-chip:hover{border-color:#0077aa;color:#7dd3fc;background:rgba(0,120,200,0.1);}
  .tag-pill{display:inline-flex;align-items:center;background:rgba(0,180,255,0.1);border:1px solid rgba(0,180,255,0.25);border-radius:2px;padding:2px 9px;margin:2px 3px 2px 0;font-size:12px;color:#7dd3fc;cursor:pointer;transition:all 0.15s;}
  .tag-pill:hover{background:rgba(0,180,255,0.2);}
  .tag-pill.active{background:rgba(0,180,255,0.3);border-color:#38bdf8;color:#e0f2fe;}

  /* ── ENTRIES ────────────────────────────────────────── */
  .filter-section{margin-bottom:20px;}
  .day-header{color:#2a4a6a;font-size:11px;letter-spacing:0.12em;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
  .day-line{flex:1;border-bottom:1px solid #111d2c;}
  .entry-row{display:flex;align-items:flex-start;gap:12px;padding:8px 10px;border-left:2px solid #1a2535;margin-bottom:4px;border-radius:0 3px 3px 0;transition:background 0.15s;}
  .entry-row:hover{background:rgba(255,255,255,0.03);}
  .entry-time{color:#2a4a6a;min-width:42px;padding-top:2px;}
  .entry-tags{flex:1;}
  .entry-actions{display:flex;}
  .del-btn{background:none;border:none;color:#3a4a60;cursor:pointer;font-size:14px;padding:2px 6px;transition:color 0.15s;}
  .del-btn:hover{color:#ff4d6d;}
  .edit-btn{background:none;border:none;color:#3a4a60;cursor:pointer;font-size:12px;padding:2px 6px;transition:color 0.15s;font-family:inherit;}
  .edit-btn:hover{color:#ffd700;}
  .edit-row{display:flex;gap:8px;}
  .save-btn{background:#003d6b;border:1px solid #0077cc;color:#7dd3fc;font-family:inherit;font-size:11px;padding:5px 12px;border-radius:3px;cursor:pointer;}
  .empty{color:#2a3a55;text-align:center;padding:60px 0;}

  /* ── CORRELATIONS ───────────────────────────────────── */
  .corr-controls{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .ctrl-group{display:inline-flex;align-items:center;gap:6px;}
  .ctrl-group input[type=range]{width:90px;}
  .corr-search{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:#e0eaf8;font-family:inherit;font-size:12px;padding:6px 12px;outline:none;transition:border-color 0.2s;width:180px;}
  .corr-search:focus{border-color:#00aaff;}
  .corr-table{display:grid;gap:1px;}
  .corr-cols{grid-template-columns:minmax(90px,1.2fr) 18px minmax(90px,1.2fr) 96px 1fr 42px 36px;}
  .corr-header{display:grid;gap:8px;padding:6px 10px;color:#2a4060;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid #1a2535;}
  .corr-header span{cursor:pointer;user-select:none;transition:color 0.15s;}
  .corr-header span:hover{color:#7dd3fc;}
  .corr-header span.sort-active{color:#00d4ff;}
  .corr-row{display:grid;gap:8px;padding:7px 10px;align-items:center;transition:background 0.15s;}
  .corr-row:hover{background:rgba(255,255,255,0.03);}
  .phi-val{font-weight:600;font-size:13px;}
  .bar-wrap{position:relative;height:6px;}
  .bar-bg{position:absolute;left:0;right:0;top:0;height:100%;background:#1a2535;}
  .bar-fill{position:absolute;top:0;height:100%;opacity:0.85;}
  .bar-center{position:absolute;left:50%;top:-1px;width:1px;height:8px;background:#2a4060;}
  .arrow-col{color:#2a4a6a;font-size:12px;text-align:center;}
  .corr-info{margin-top:24px;padding:14px 16px;background:rgba(0,170,255,0.04);border:1px solid #1a2535;border-radius:3px;color:#4a6080;font-size:11px;line-height:1.7;}

  /* ── HEATMAP ────────────────────────────────────────── */
  .heat-grid{overflow-x:auto;}
  .heat-row{display:grid;gap:2px;margin-bottom:3px;}
  .heat-cell{border-radius:2px;display:flex;align-items:center;justify-content:center;cursor:default;}
  .heat-cell:hover{outline:1px solid #ffffff44;}

  /* ── MISC ───────────────────────────────────────────── */
  @keyframes fadeIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeIn 0.3s ease;}
  input[type=range]{accent-color:#00d4ff;}
  input[type=datetime-local]{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:#e0eaf8;font-family:'JetBrains Mono','Fira Mono',monospace;font-size:12px;padding:9px 10px;outline:none;transition:border-color 0.2s;color-scheme:dark;}
  input[type=datetime-local]:focus{border-color:#00aaff;}
  .dt-toggle{background:none;border:1px solid #1a2a3a;color:#2a4a6a;font-family:inherit;font-size:11px;padding:9px 11px;border-radius:3px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .dt-toggle:hover{border-color:#0077cc;color:#7dd3fc;}
  .dt-toggle.active{border-color:#0066aa;color:#38bdf8;background:rgba(0,100,200,0.1);}
  .dt-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .io-btn{background:none;border:1px solid #1e3050;color:#3a6080;font-family:inherit;font-size:11px;letter-spacing:0.06em;padding:4px 12px;border-radius:3px;cursor:pointer;transition:all 0.2s;}
  .io-btn:hover{border-color:#0077cc;color:#7dd3fc;background:rgba(0,120,200,0.08);}
  .io-btn.flash-green{border-color:#00ff9d;color:#00ff9d;}
  .io-btn.flash-red{border-color:#ff4d6d;color:#ff4d6d;}
  .role-badge{display:inline-block;border-radius:2px;padding:1px 6px;font-size:10px;letter-spacing:0.06em;font-weight:600;vertical-align:middle;margin-left:3px;}
  .role-cause{background:rgba(255,180,0,0.12);border:1px solid rgba(255,180,0,0.3);color:#ffd060;}
  .role-effect{background:rgba(255,80,100,0.12);border:1px solid rgba(255,80,100,0.3);color:#ff8fa3;}
  .role-both{background:rgba(140,80,255,0.12);border:1px solid rgba(140,80,255,0.3);color:#c4a0ff;}
  .role-none{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#4a6080;}
  .role-btn{background:none;border:1px solid #1a2535;border-radius:2px;font-family:inherit;font-size:10px;padding:1px 7px;cursor:pointer;transition:all 0.15s;color:#3a5070;}
  .role-btn:hover{border-color:#4a6080;color:#a0c0e0;}
  .role-btn.active-cause{background:rgba(255,180,0,0.15);border-color:rgba(255,180,0,0.5);color:#ffd060;}
  .role-btn.active-effect{background:rgba(255,80,100,0.15);border-color:rgba(255,80,100,0.5);color:#ff8fa3;}
  .role-btn.active-both{background:rgba(140,80,255,0.15);border-color:rgba(140,80,255,0.5);color:#c4a0ff;}
  .role-picker-row{display:flex;align-items:center;gap:8px;padding:5px 10px;background:rgba(0,0,0,0.2);border-left:2px solid #1a3050;border-radius:0 3px 3px 0;margin-bottom:3px;flex-wrap:wrap;}
  .role-picker-tag{color:#7dd3fc;font-size:11px;min-width:80px;}
  .tags-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-left:2px solid #1a2535;margin-bottom:4px;border-radius:0 3px 3px 0;transition:background 0.15s;}
  .tags-row:hover{background:rgba(255,255,255,0.02);}
  .tags-row-name{flex:1;color:#c8d4e8;font-size:12px;}
  .cat-dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:7px;vertical-align:middle;flex-shrink:0;}
  .cat-chip{display:inline-block;border-radius:2px;padding:2px 9px;margin:2px;font-size:11px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;opacity:0.55;}
  .cat-chip:hover{opacity:0.85;}
  .cat-chip.active{opacity:1;border-color:rgba(255,255,255,0.3);}
  .cat-group-header{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;padding:4px 10px;margin:12px 0 4px;border-left:3px solid;}
  .tag-panel{position:fixed;top:0;right:0;width:360px;max-width:95vw;height:100vh;background:#0b1018;border-left:1px solid #1a2535;z-index:200;display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,0.5);transform:translateX(100%);transition:transform 0.22s ease;}
  .tag-panel.open{transform:translateX(0);}
  .tag-panel-head{padding:16px 18px 12px;border-bottom:1px solid #1a2535;display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .tag-panel-body{flex:1;overflow-y:auto;padding:14px 18px;}
  .tag-panel-section{margin-bottom:20px;}
  .tag-panel-section-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#2a4060;margin-bottom:8px;}
  .tag-corr-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #0e1620;}
  .tag-corr-row:last-child{border-bottom:none;}
  .tag-corr-name{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tag-corr-phi{font-size:12px;font-weight:600;min-width:52px;text-align:right;}
  .tag-panel-overlay{position:fixed;inset:0;z-index:199;background:rgba(0,0,0,0.25);}
  .num-val{font-size:10px;opacity:0.85;margin-left:4px;font-weight:600;}
  .num-panel{background:rgba(0,60,40,0.12);border:1px solid #1a3530;border-radius:3px;padding:10px 14px;margin-bottom:14px;}
  .num-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
  .num-row:last-child{margin-bottom:0;}
  .num-label{color:#7dd3fc;font-size:12px;min-width:100px;}
  .num-input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:3px;color:#e0eaf8;font-family:inherit;font-size:13px;padding:4px 10px;width:80px;outline:none;text-align:center;}
  .num-input:focus{border-color:#00aaff;}
  input[type=range].num-slider{width:160px;accent-color:#00d4ff;}
  .corr-type{font-size:9px;letter-spacing:0.06em;padding:1px 5px;border-radius:2px;opacity:0.7;}
  /* profile view */
  .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  .profile-card{background:rgba(255,255,255,0.02);border:1px solid #1a2535;border-radius:4px;padding:14px 16px;}
  .profile-card-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#2a4060;margin-bottom:10px;}
  .profile-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .profile-bar-label{font-size:11px;color:#7dd3fc;min-width:72px;flex-shrink:0;}
  .profile-bar-track{flex:1;height:8px;background:#0e1a28;border-radius:2px;overflow:hidden;}
  .profile-bar-fill{height:100%;border-radius:2px;transition:width 0.3s;}
  .profile-bar-val{font-size:10px;color:#4a6080;min-width:28px;text-align:right;}
  .profile-tag-picker{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
  .profile-select{background:#0d1520;border:1px solid #1e3050;border-radius:4px;color:#e0eaf8;font-family:inherit;font-size:14px;padding:8px 12px;outline:none;cursor:pointer;min-width:200px;max-width:100%;}
  .profile-select:focus{border-color:#00aaff;}
  .profile-select option{background:#0d1520;color:#e0eaf8;}
  @media(max-width:600px){.profile-grid{grid-template-columns:1fr;}}

  /* ════════════════════════════════════════════════════
     MOBILE  (≤ 600px)
  ════════════════════════════════════════════════════ */
  @media(max-width:600px){
    body{font-size:14px;}

    /* Header: stack logo row, hide subtitle, compact export buttons */
    .header{padding:10px 14px 0;}
    .header-top{gap:8px;margin-bottom:8px;}
    .logo{font-size:15px;}
    .subtitle{display:none;}
    .stats{font-size:10px;}
    .io-btn{font-size:10px;padding:3px 8px;}

    /* Nav: equal-width full-row tabs, bigger tap targets */
    .nav{width:100%;}
    .nav-btn{flex:1;text-align:center;padding:10px 4px;font-size:10px;letter-spacing:0.04em;}

    /* Main: tighter padding */
    .main{padding:14px 12px;}

    /* Log input: stack vertically on very small screens */
    .input-row{flex-direction:column;gap:6px;}
    .log-btn{width:100%;padding:12px;font-size:14px;}
    .input-field{font-size:14px;padding:12px 14px;}

    /* Datetime picker row wraps */
    .dt-wrap{flex-wrap:wrap;gap:6px;}
    .dt-toggle{font-size:12px;padding:8px 12px;}

    /* Suggest chips: slightly bigger tap targets */
    .suggest-chip{font-size:12px;padding:4px 10px;margin:3px;}

    /* Tag pills: bigger on mobile */
    .tag-pill{font-size:13px;padding:4px 12px;margin:3px 4px 3px 0;}

    /* Entry rows */
    .entry-time{min-width:36px;font-size:11px;}
    .entry-row{padding:8px 8px;gap:8px;}
    .edit-btn,.del-btn{font-size:16px;padding:4px 8px;}

    /* Correlations: simplified 4-col grid on mobile */
    .corr-cols{grid-template-columns:1fr 14px 1fr auto;}
    .corr-header{display:none;}
    .corr-row{padding:8px 10px;gap:6px;}
    .corr-cell-bar,.corr-cell-days,.corr-cell-type{display:none;}
    .corr-cell-phi{font-size:13px;}

    /* Corr controls: wrap to 2-per-row neatly */
    .corr-controls{gap:8px;}
    .corr-search{width:100%;}

    /* Tags row: wrap controls */
    .tags-row{flex-wrap:wrap;gap:8px;padding:10px 8px;align-items:flex-start;}
    .tags-row-name{font-size:13px;}
    /* On mobile, hide role buttons in tags screen to reduce clutter — use tag panel instead */
    .tags-row .role-btn{display:none;}

    /* Role buttons: bigger tap */
    .role-btn{font-size:12px;padding:4px 10px;}
    /* Sentiment emoji buttons: bigger on mobile */
    .sent-btn{font-size:18px;padding:4px 8px;}

    /* Tag panel: full width on mobile */
    .tag-panel{width:100%;border-left:none;border-top:1px solid #1a2535;top:auto;bottom:0;height:70vh;transform:translateY(100%);transition:transform 0.22s ease;}
    .tag-panel.open{transform:translateY(0);}

    /* Heatmap: let it scroll horizontally as before, just label it */
    .heat-grid{-webkit-overflow-scrolling:touch;}

    /* Numeric panel */
    .num-row{gap:6px;}
    input[type=range].num-slider{width:100%;}

    /* Sliders — much bigger touch targets on mobile */
    input[type=range]{
      width:100%;
      height:28px;
      cursor:pointer;
    }
    /* Override corr-controls slider widths to fill available space */
    .corr-controls input[type=range]{width:100px;}

    /* Corr controls: each ctrl-group on its own row */
    .corr-controls{flex-direction:column;align-items:stretch;gap:10px;}
    .ctrl-group{display:flex;align-items:center;gap:10px;width:100%;}
    .ctrl-group input[type=range]{flex:1;min-width:0;}
    .corr-search{width:100%;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="logo">◈ CORRELdiary</span>
    <span class="subtitle">v1.5 — personal pattern tracker</span>
    <span class="stats" id="stats">0 entries · 0 tags</span>
    <div style="display:flex;gap:6px;margin-left:16px">
      <button class="io-btn" onclick="exportData()" title="Export all entries to a JSON backup file">↑ export</button>
      <button class="io-btn" onclick="document.getElementById('import-file').click()" title="Import entries from a previously exported JSON file">↓ import</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)"/>
    </div>
  </div>
  <div id="import-toast" style="display:none;position:fixed;top:16px;right:20px;background:#003d6b;border:1px solid #0077cc;color:#7dd3fc;font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 18px;border-radius:3px;z-index:100;transition:opacity 0.4s"></div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchView('log')">log</button>
    <button class="nav-btn" onclick="switchView('correlations')">correlations</button>
    <button class="nav-btn" onclick="switchView('heatmap')">profile</button>
    <button class="nav-btn" onclick="switchView('tags')">tags</button>
  </div>
</div>

<div class="main">
  <!-- LOG VIEW -->
  <div id="view-log">
    <div class="section-label">— log entry —</div>
    <div class="input-row">
      <input class="input-field" id="entry-input" placeholder="e.g.  coffee, mood:75, headache  (use tag:value for numeric tags)" onkeydown="if(event.key==='Enter')addEntry()" oninput="previewNumericPanel(this.value)"/>
      <button class="log-btn" id="log-btn" onclick="addEntry()">+ LOG</button>
    </div>
    <div class="dt-wrap">
      <button class="dt-toggle" id="dt-toggle-btn" onclick="toggleDatePicker()" title="Set a custom date/time for this entry">⏱ custom time</button>
      <input type="datetime-local" id="entry-dt" style="display:none" title="Leave blank to use current time"/>
      <span id="dt-hint" style="display:none;color:#2a6a4a;font-size:11px"></span>
    </div>
    <div class="chips" id="suggest-chips"></div>
    <div id="num-input-panel" style="display:none"></div>
    <div id="inline-role-picker" style="display:none;margin-bottom:16px;padding:10px 12px;background:rgba(0,60,100,0.08);border:1px solid #1a3050;border-radius:3px"></div>
    <div class="filter-section" id="filter-section" style="display:none">
      <div class="section-label">— filter by category —</div>
      <div id="filter-tags"></div>
    </div>
    <div id="entries-list"></div>
  </div>

  <!-- CORRELATIONS VIEW -->
  <div id="view-correlations" style="display:none">
    <div class="section-label">— pairwise correlations (phi coefficient, per day) —</div>
    <div id="corr-content"></div>
  </div>

  <!-- HEATMAP VIEW -->
  <div id="view-heatmap" style="display:none">
    <div id="profile-section-label" class="section-label">— tag profile —</div>
    <div id="heatmap-content"></div>
  </div>

  <!-- TAG DETAIL PANEL -->
  <div class="tag-panel-overlay" id="tag-panel-overlay" style="display:none" onclick="closeTagPanel()"></div>
  <div class="tag-panel" id="tag-panel">
    <div class="tag-panel-head">
      <span id="tag-panel-title" style="font-size:14px;font-weight:600;color:#e0eaf8;flex:1"></span>
      <button onclick="closeTagPanel()" style="background:none;border:none;color:#4a6080;font-size:18px;cursor:pointer;padding:2px 6px">✕</button>
    </div>
    <div class="tag-panel-body" id="tag-panel-body"></div>
  </div>

  <!-- TAGS VIEW -->
  <div id="view-tags" style="display:none">
    <div class="section-label">— tags · categories · roles —</div>
    <div id="tags-content"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'correlation-diary-entries';
const ROLES_KEY   = 'correlation-diary-roles';
const META_KEY    = 'correlation-diary-meta';
const SAMPLE_TAGS = ['coffee','alcohol','exercise','meditation','good sleep','poor sleep','stress','sugar','headache','energy high','brain fog','anxiety','productive','tired'];

let entries = [];
let tagRoles = {};
let tagMeta  = {}; // { tagName: { cat?, img?, numeric?: {min,max,step} } }
let currentView = 'log';
let filterTag = ''; // tag name (kept for entry-row highlighting)
let filterCat = '';  // category filter on log view
let corrMin = 0;
let corrMinDays = 3; // minimum co-occurrences to show
let corrLag = 0;      // day lag: 0=same day, 1=next day, etc.
let profileTag = '';  // currently selected tag in profile view
let corrRequireVariance = true; // hide pairs where binary side has no variance
let corrSort = {col:'phi', dir:'desc'};
let corrSearch = '';
let corrCatA = '';
let corrCatB = '';
let pendingRoleTags = [];
let pendingNumericTags = []; // numeric tags in current log entry awaiting value input

// Load
try { const r = localStorage.getItem(STORAGE_KEY); if(r) entries = JSON.parse(r); } catch{}
try { const r = localStorage.getItem(ROLES_KEY);   if(r) tagRoles = JSON.parse(r); } catch{}
try { const r = localStorage.getItem(META_KEY);    if(r) tagMeta  = JSON.parse(r); } catch{}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch{}
  try { localStorage.setItem(ROLES_KEY,   JSON.stringify(tagRoles)); } catch{}
  try { localStorage.setItem(META_KEY,    JSON.stringify(tagMeta));  } catch{}
}

function setRole(tag, role) {
  // Toggle off if clicking same role
  if(tagRoles[tag] === role) delete tagRoles[tag];
  else tagRoles[tag] = role;
  save();
  // Re-render whatever is currently showing, plus refresh inline picker if visible
  const picker = document.getElementById('inline-role-picker');
  if(picker) renderInlineRolePicker(pendingRoleTags);
  if(currentView==='tags') renderTags();
  if(currentView==='correlations') renderCorrelations();
  // refresh tag pills in log to show updated badges
  if(currentView==='log') renderLog();
}

function roleLabel(tag) {
  const r = tagRoles[tag];
  if(!r) return '';
  if(r==='cause')  return '<span class="role-badge role-cause">C</span>';
  if(r==='effect') return '<span class="role-badge role-effect">E</span>';
  if(r==='both')   return '<span class="role-badge role-both">~</span>';
  return '';
}

function roleBtns(tag, context) {
  const r = tagRoles[tag]||'';
  return `
    <button class="role-btn ${r==='cause'?'active-cause':''}"  onclick="setRole('${escHtml(tag)}','cause')"  title="Cause — can drive effects">C</button>
    <button class="role-btn ${r==='effect'?'active-effect':''}" onclick="setRole('${escHtml(tag)}','effect')" title="Effect — result of causes">E</button>
    <button class="role-btn ${r==='both'?'active-both':''}"   onclick="setRole('${escHtml(tag)}','both')"   title="Both — can be either">~</button>
  `;
}

function sentimentBtns(tag) {
  const s = tagSentiment(tag)||'';
  const mkBtn = (val, emoji, title) => {
    const active = s===val;
    const activeSt = val==='positive'?'background:rgba(0,220,100,0.15);border-color:rgba(0,220,100,0.4)':
                                       'background:rgba(255,60,80,0.15);border-color:rgba(255,60,80,0.4)';
    return `<button class="role-btn sent-btn" onclick="setTagMeta('${escHtml(tag)}','sentiment',tagSentiment('${escHtml(tag)}')==='${val}'?null:'${val}')"
      title="${title}" style="font-size:14px;padding:2px 7px;${active?activeSt:''}">${emoji}</button>`;
  };
  return mkBtn('positive','😊','Positive effect') + mkBtn('negative','😞','Negative effect');
}

// ── Category color palette ───────────────────────────────
// Auto-assigns a stable color to each unique category name
const CAT_PALETTE = [
  '#4fc3f7','#81c784','#ffb74d','#f06292','#ce93d8',
  '#80cbc4','#ff8a65','#a5d6a7','#fff176','#90caf9',
  '#ef9a9a','#b39ddb','#80deea','#ffcc80','#c5e1a5'
];
const _catColorCache = {};
function categoryColor(cat) {
  if(!cat) return null;
  if(_catColorCache[cat]) return _catColorCache[cat];
  // Deterministic index from string hash
  let h = 0;
  for(let i=0;i<cat.length;i++) h = (h*31 + cat.charCodeAt(i)) & 0xffff;
  _catColorCache[cat] = CAT_PALETTE[h % CAT_PALETTE.length];
  return _catColorCache[cat];
}

function tagCategory(tag) {
  return (tagMeta[tag] && tagMeta[tag].cat) || null;
}
function tagColor(tag) {
  // Color comes from category, not stored per-tag anymore
  return categoryColor(tagCategory(tag));
}
function tagImg(tag) {
  return (tagMeta[tag] && tagMeta[tag].img) || null;
}
function tagSentiment(tag) {
  return (tagMeta[tag] && tagMeta[tag].sentiment) || null;
}
function sentimentWeight(tag) {
  const s = tagSentiment(tag);
  return s==='positive' ? 1 : s==='negative' ? -1 : 0;
}
function sentimentBadge(s) {
  if(s==='positive') return '<span style="font-size:13px" title="positive effect">😊</span>';
  if(s==='negative') return '<span style="font-size:13px" title="negative effect">😞</span>';
  return '';
}
function computeCauseScore(causeTag, lag) {
  const corrs = computeCorrelationsWithLag(lag);
  let score = 0, count = 0;
  for(const {a,b,phi,coOccurrences} of corrs) {
    if(a !== causeTag) continue;
    const w = sentimentWeight(b);
    if(w === 0) continue;
    const conf = Math.min(coOccurrences / 10, 1);
    score += phi * w * conf;
    count++;
  }
  return count ? score : null;
}
function causeScoreHtml(tag) {
  if(!canBeCause(tag)) return '';
  const s0 = computeCauseScore(tag, 0);
  const s1 = computeCauseScore(tag, 1);
  if(s0===null && s1===null) return '';
  const fmt = v => {
    if(v===null) return '<span style="color:#2a4060">—</span>';
    const col = v>0.1?'#00ff9d':v<-0.1?'#ff4d6d':'#8892a4';
    return `<span style="color:${col};font-weight:600">${v>0?'+':''}${v.toFixed(2)}</span>`;
  };
  const combined = (s0!==null && s1!==null) ? (s0+s1)/2 : (s0??s1);
  const combCol = combined>0.1?'#00ff9d':combined<-0.1?'#ff4d6d':'#8892a4';
  return `<span style="display:inline-flex;align-items:center;gap:5px;font-size:10px;background:rgba(255,255,255,0.03);border:1px solid #1a2535;border-radius:3px;padding:2px 7px;flex-shrink:0" title="Impact score&#10;Same-day: ${s0!==null?s0.toFixed(2):'—'} · Lag-1: ${s1!==null?s1.toFixed(2):'—'}&#10;= Σ(phi × effect_sentiment × confidence)">
    <span style="color:#2a4060">impact</span>
    <span style="color:${combCol};font-weight:700">${combined>0?'+':''}${combined.toFixed(2)}</span>
    <span style="color:#2a4060;font-size:9px">(${fmt(s0)} / ${fmt(s1)})</span>
  </span>`;
}
function allCategories() {
  const cats = new Set();
  for(const t of allTags()){ const c=tagCategory(t); if(c) cats.add(c); }
  return [...cats].sort();
}

function tagPillStyle(tag) {
  const col = tagColor(tag);
  if(!col) return '';
  const r=parseInt(col.slice(1,3),16), g=parseInt(col.slice(3,5),16), b=parseInt(col.slice(5,7),16);
  return `background:rgba(${r},${g},${b},0.13);border-color:rgba(${r},${g},${b},0.4);color:${col};`;
}
function tagVisualPrefix(tag) {
  const img = tagImg(tag);
  if(img) return `<img src="${img}" style="width:26px;height:26px;border-radius:3px;object-fit:cover;margin-right:6px;vertical-align:middle;display:inline-block"/>`;
  const col = tagColor(tag);
  if(col) return `<span class="cat-dot" style="background:${col}"></span>`;
  return '';
}

function setTagMeta(tag, key, value) {
  if(!tagMeta[tag]) tagMeta[tag] = {};
  if(value === null || value === undefined || value === '') delete tagMeta[tag][key];
  else tagMeta[tag][key] = value;
  if(Object.keys(tagMeta[tag]).length === 0) delete tagMeta[tag];
  save();
  render();
}

function handleTagImageUpload(tag, input) {
  const file = input.files[0];
  if(!file) return;
  if(file.size > 200*1024) { showToast('✕ image too large — max 200 KB', 'red'); return; }
  const reader = new FileReader();
  reader.onload = e => { setTagMeta(tag, 'img', e.target.result); };
  reader.readAsDataURL(file);
}

// ── Numeric tag helpers ──────────────────────────────────
function isNumericTag(tag) {
  return !!(tagMeta[tag] && tagMeta[tag].numeric);
}
function tagNumericDef(tag) {
  return (tagMeta[tag] && tagMeta[tag].numeric) || null;
}
function entryNumVal(entry, tag) {
  return (entry.numericValues && entry.numericValues[tag] !== undefined)
    ? entry.numericValues[tag] : undefined;
}

function parseText(t) {
  // Supports "mood:75", "mood=75" inline numeric syntax
  const parts = t.split(/[,;]+/).map(s=>s.trim()).filter(Boolean);
  const tags = [], inlineValues = {};
  for(const p of parts){
    const m = p.match(/^(.+?)[:=](-?\d+(?:\.\d+)?)$/);
    if(m){
      const tag = m[1].trim().toLowerCase();
      tags.push(tag);
      inlineValues[tag] = parseFloat(m[2]);
    } else {
      tags.push(p.toLowerCase());
    }
  }
  return {tags, inlineValues};
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function getHour(iso){ return new Date(iso).getHours(); }
function localDay(iso){
  // Returns "YYYY-MM-DD" in the user's LOCAL timezone (fixes UTC-date bug)
  const d = new Date(iso);
  const pad = n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function addDays(dateStr, n){
  // Returns a new "YYYY-MM-DD" string n days after dateStr
  const d = new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+n);
  const pad = k=>String(k).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function allTags() {
  return [...new Set(entries.flatMap(e=>e.tags))].sort();
}

function switchView(v) {
  currentView = v;
  ['log','correlations','heatmap','tags'].forEach(x=>{
    document.getElementById('view-'+x).style.display = x===v?'block':'none';
    document.querySelectorAll('.nav-btn').forEach((b,i)=>{
      b.classList.toggle('active', ['log','correlations','heatmap','tags'][i]===v);
    });
  });
  render();
}

function toggleDatePicker() {
  const dtInput = document.getElementById('entry-dt');
  const btn = document.getElementById('dt-toggle-btn');
  const hint = document.getElementById('dt-hint');
  const isOpen = dtInput.style.display !== 'none';
  if(isOpen) {
    dtInput.style.display = 'none';
    dtInput.value = '';
    btn.classList.remove('active');
    btn.textContent = '⏱ custom time';
    hint.style.display = 'none';
  } else {
    // Pre-fill with current local time
    const now = new Date();
    now.setSeconds(0,0);
    dtInput.value = toLocalDatetimeValue(now);
    dtInput.style.display = 'inline-block';
    btn.classList.add('active');
    btn.textContent = '⏱ custom time ✓';
    hint.style.display = 'inline';
    hint.textContent = '← using this time';
    dtInput.focus();
  }
}

function toLocalDatetimeValue(d) {
  // Returns "YYYY-MM-DDTHH:MM" in local time for datetime-local input
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// Temp store for pre-entry numeric values (before logging)
let previewNumValues = {};

function previewNumericPanel(inputStr) {
  const {tags, inlineValues} = parseText(inputStr);
  const panel = document.getElementById('num-input-panel');
  if(!panel) return;
  // Show sliders for known numeric tags that don't already have inline value
  const numTags = tags.filter(t => isNumericTag(t) && inlineValues[t] === undefined);
  if(!numTags.length){ panel.style.display='none'; return; }
  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="num-panel">
      <div style="color:#2a6050;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px">— values for this entry —</div>
      ${numTags.map(t => {
        const def = tagNumericDef(t);
        const min = def.min, max = def.max, step = def.step||1;
        const cur = previewNumValues[t] !== undefined ? previewNumValues[t] : Math.round((min+max)/2);
        const col = tagColor(t) || '#00d4ff';
        return `<div class="num-row">
          <span class="num-label" style="${tagColor(t)?'color:'+tagColor(t):''}">${tagVisualPrefix(t)}${escHtml(t)}</span>
          <input type="range" class="num-slider" min="${min}" max="${max}" step="${step}" value="${cur}"
            oninput="previewNumValues['${escHtml(t)}']=+this.value;document.getElementById('pnv-${escHtml(t)}').value=this.value"
            style="accent-color:${col}"/>
          <input class="num-input" id="pnv-${escHtml(t)}" type="number"
            min="${min}" max="${max}" step="${step}" value="${cur}"
            oninput="previewNumValues['${escHtml(t)}']=+this.value"/>
          <span style="color:#2a5040;font-size:10px">${min}–${max}</span>
        </div>`;
      }).join('')}
    </div>`;
}

function addEntry() {
  const inp = document.getElementById('entry-input');
  const {tags, inlineValues} = parseText(inp.value);
  if(!tags.length) return;

  const dtInput = document.getElementById('entry-dt');
  let timestamp;
  if(dtInput.style.display !== 'none' && dtInput.value) {
    timestamp = new Date(dtInput.value).toISOString();
  } else {
    timestamp = new Date().toISOString();
  }

  // Build numericValues: inline values + whatever was set in the preview sliders
  const numericValues = {...previewNumValues, ...inlineValues};
  previewNumValues = {}; // reset

  const entry = {id: Date.now().toString(), timestamp, tags, raw: inp.value.trim(), numericValues};
  entries.unshift(entry);
  entries.sort((a,b) => b.timestamp.localeCompare(a.timestamp));
  inp.value = '';

  // Pending: roles for new tags, and numeric inputs for numeric tags without inline values
  pendingRoleTags = tags.filter(t => !tagRoles[t]);
  pendingNumericTags = tags.filter(t => isNumericTag(t) && numericValues[t] === undefined);

  // Reset datetime picker
  dtInput.style.display = 'none';
  dtInput.value = '';
  document.getElementById('dt-toggle-btn').classList.remove('active');
  document.getElementById('dt-toggle-btn').textContent = '⏱ custom time';
  document.getElementById('dt-hint').style.display = 'none';

  // Hide preview panel
  const pp = document.getElementById('num-input-panel');
  if(pp) pp.style.display='none';

  save();
  const btn = document.getElementById('log-btn');
  btn.textContent = '✓ logged';
  btn.classList.add('flash');
  setTimeout(()=>{btn.textContent='+ LOG';btn.classList.remove('flash');},600);
  render();
  if(pendingNumericTags.length) renderNumericPanel(entry.id, pendingNumericTags);
  if(pendingRoleTags.length) renderInlineRolePicker(pendingRoleTags);
}

function renderNumericPanel(entryId, numTags) {
  const panel = document.getElementById('num-input-panel');
  if(!panel) return;
  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="num-panel">
      <div style="color:#2a6050;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px">— enter values —</div>
      ${numTags.map(t => {
        const def = tagNumericDef(t);
        const min = def ? def.min : 0, max = def ? def.max : 100, step = def ? def.step : 1;
        const mid = Math.round((min+max)/2);
        const col = tagColor(t) || '#00d4ff';
        return `<div class="num-row">
          <span class="num-label" style="${tagColor(t)?'color:'+tagColor(t):''}">${tagVisualPrefix(t)}${escHtml(t)}</span>
          <input type="range" class="num-slider" min="${min}" max="${max}" step="${step}" value="${mid}"
            oninput="document.getElementById('nv-${entryId}-${escHtml(t)}').value=this.value;setEntryNumVal('${entryId}','${escHtml(t)}',+this.value)"
            style="accent-color:${col}"/>
          <input class="num-input" id="nv-${entryId}-${escHtml(t)}" type="number"
            min="${min}" max="${max}" step="${step}" value="${mid}"
            oninput="setEntryNumVal('${entryId}','${escHtml(t)}',+this.value)"/>
          <span style="color:#2a5040;font-size:10px">${min}–${max}</span>
        </div>`;
      }).join('')}
      <button class="io-btn" onclick="document.getElementById('num-input-panel').style.display='none'" style="font-size:10px;padding:3px 10px;margin-top:6px">done</button>
    </div>`;
}

function setEntryNumVal(entryId, tag, value) {
  const entry = entries.find(e=>e.id===entryId);
  if(!entry) return;
  if(!entry.numericValues) entry.numericValues = {};
  entry.numericValues[tag] = value;
  save();
  // Refresh just the tag pills for this entry without full re-render
  const row = document.getElementById('entry-tags-'+entryId);
  if(row) {
    const e = entries.find(x=>x.id===entryId);
    if(e) row.innerHTML = e.tags.map(t => tagPillHtml(t, e, filterTag)).join('');
  }
}

function renderInlineRolePicker(tags) {
  const container = document.getElementById('inline-role-picker');
  if(!container) return;
  const unassigned = tags.filter(t => !tagRoles[t]);
  if(!unassigned.length) { container.style.display='none'; return; }
  container.style.display = 'block';
  container.innerHTML = `
    <div style="color:#2a5070;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">— assign roles to new tags —</div>
    ${unassigned.map(t=>`
      <div class="role-picker-row">
        <span class="role-picker-tag">${escHtml(t)}</span>
        ${roleBtns(t,'inline')}
        <span style="color:#2a4060;font-size:10px;margin-left:4px">${tagRoles[t]?'✓':''}</span>
      </div>
    `).join('')}
    <div style="margin-top:6px">
      <button class="io-btn" onclick="document.getElementById('inline-role-picker').style.display='none'" style="font-size:10px;padding:3px 10px">dismiss</button>
      <span style="color:#2a4060;font-size:10px;margin-left:8px">unassigned tags treated as "both" in correlations</span>
    </div>
  `;
}

function deleteEntry(id) {
  entries = entries.filter(e=>e.id!==id);
  save(); render();
}

function startEdit(id) {
  const e = entries.find(x=>x.id===id);
  if(!e) return;
  const row = document.getElementById('entry-tags-'+id);
  const dtVal = toLocalDatetimeValue(new Date(e.timestamp));
  row.innerHTML = `<div class="edit-row" style="flex-wrap:wrap;gap:6px">
    <input class="input-field" id="edit-inp-${id}" style="font-size:12px;padding:5px 10px;min-width:200px;flex:1" value="${escHtml(e.raw||e.tags.join(', '))}"/>
    <input type="datetime-local" id="edit-dt-${id}" value="${dtVal}" title="Edit date/time" style="flex-shrink:0"/>
    <button class="save-btn" onclick="saveEdit('${id}')">save</button>
    <button class="del-btn" onclick="cancelEdit('${id}')">✕</button>
  </div>`;
  const inp = document.getElementById('edit-inp-'+id);
  inp.focus();
  inp.onkeydown = ev => { if(ev.key==='Enter') saveEdit(id); if(ev.key==='Escape') cancelEdit(id); };
}

function saveEdit(id) {
  const inp = document.getElementById('edit-inp-'+id);
  const dtInp = document.getElementById('edit-dt-'+id);
  if(!inp) return;
  const {tags, inlineValues} = parseText(inp.value);
  if(!tags.length) return;
  const newTimestamp = (dtInp && dtInp.value) ? new Date(dtInp.value).toISOString() : undefined;
  entries = entries.map(e => {
    if(e.id!==id) return e;
    // Merge inline values into existing numericValues
    const numericValues = {...(e.numericValues||{}), ...inlineValues};
    return {...e, tags, raw:inp.value.trim(), numericValues, ...(newTimestamp ? {timestamp: newTimestamp} : {})};
  });
  entries.sort((a,b) => b.timestamp.localeCompare(a.timestamp));
  save(); render();
}

function cancelEdit(id) { render(); }

function setFilter(t) {
  if(t===''){filterTag='';filterCat='';closeTagPanel();}
  else{
    openTagPanel(t);
    const cat=tagCategory(t);
    if(cat){filterCat=cat;filterTag='';}
    else{filterTag=filterTag===t?'':t;filterCat='';}
  }
  render();
}

function openTagPanel(tag) {
  document.getElementById('tag-panel-title').innerHTML = tagVisualPrefix(tag) + escHtml(tag);
  document.getElementById('tag-panel-body').innerHTML = buildTagPanel(tag);
  document.getElementById('tag-panel').classList.add('open');
  document.getElementById('tag-panel-overlay').style.display = 'block';
}

function closeTagPanel() {
  document.getElementById('tag-panel').classList.remove('open');
  document.getElementById('tag-panel-overlay').style.display = 'none';
}

function buildTagPanel(tag) {
  const empty = '<div style="color:#2a4060;font-size:11px">Not enough data yet.</div>';

  const makeRows = (pairs) => pairs.length ? pairs.map(({a,b,phi,coOccurrences,type}) => {
    const lowSample = coOccurrences < 7;
    const isA = a===tag;
    const other = isA ? b : a;
    const direction = isA ? '→' : '←';
    const col = phiColor(phi);
    const typeBadge = type==='num-num'?'#↔#':type==='num-bin'?'#→○':type==='bin-num'?'○→#':'○↔○';
    return `<div class="tag-corr-row" style="${lowSample?'opacity:0.65':''}">
      <span style="color:#2a4060;font-size:10px;width:16px;text-align:center;flex-shrink:0">${direction}</span>
      <span class="tag-corr-name" style="${tagPillStyle(other)}">${tagVisualPrefix(other)}${escHtml(other)}</span>
      <span style="color:#2a4060;font-size:10px;flex-shrink:0">${coOccurrences}d</span>
      <span style="color:#2a4060;font-size:9px;flex-shrink:0">${typeBadge}</span>
      <span class="tag-corr-phi" style="color:${col}">${lowSample?'<span class=\"corr-warn\" title=\"Only '+coOccurrences+' days\">!</span> ':''}${phi>0?'+':''}${phi.toFixed(2)}</span>
    </div>`;
  }).join('') : empty;

  // Same-day pairs (both directions mixed — timing within day handles direction)
  const samePairs = computeCorrelationsWithLag(0)
    .filter(p=>p.a===tag||p.b===tag)
    .sort((x,y)=>Math.abs(y.phi)-Math.abs(x.phi)).slice(0,6);

  // Lag-1: split by direction
  const lag1All = computeCorrelationsWithLag(1);
  const predictsPairs    = lag1All.filter(p=>p.a===tag).sort((x,y)=>Math.abs(y.phi)-Math.abs(x.phi)).slice(0,5);
  const predictedByPairs = lag1All.filter(p=>p.b===tag).sort((x,y)=>Math.abs(y.phi)-Math.abs(x.phi)).slice(0,5);

  const sections = [
    `<div class="tag-panel-section">
      <div class="tag-panel-section-label">same day</div>
      ${makeRows(samePairs)}
    </div>`,
    `<div class="tag-panel-section">
      <div class="tag-panel-section-label">→ predicts tomorrow</div>
      <div style="color:#1a3040;font-size:10px;margin-bottom:6px">this tag → effect next day</div>
      ${makeRows(predictsPairs)}
    </div>`,
    `<div class="tag-panel-section">
      <div class="tag-panel-section-label">← predicted by yesterday</div>
      <div style="color:#1a3040;font-size:10px;margin-bottom:6px">cause yesterday → this tag today</div>
      ${makeRows(predictedByPairs)}
    </div>`,
  ];

  // Numeric stats
  const def = tagNumericDef(tag);
  let numStats = '';
  if(def) {
    const vals = entries.flatMap(e => { const v=entryNumVal(e,tag); return v!==undefined?[v]:[]; });
    if(vals.length) {
      const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
      numStats = `<div class="tag-panel-section">
        <div class="tag-panel-section-label">numeric stats (${vals.length} readings)</div>
        <div style="display:flex;gap:16px;font-size:12px">
          <span style="color:#4a6080">avg <span style="color:#7dd3fc">${avg}</span></span>
          <span style="color:#4a6080">min <span style="color:#7dd3fc">${Math.min(...vals)}</span></span>
          <span style="color:#4a6080">max <span style="color:#7dd3fc">${Math.max(...vals)}</span></span>
        </div>
      </div>`;
    }
  }
  return numStats + sections.join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function phiColor(phi) {
  if(phi>0.5) return '#00ff9d';
  if(phi>0.2) return '#7affcc';
  if(phi<-0.5) return '#ff4d6d';
  if(phi<-0.2) return '#ff8fa3';
  return '#8892a4';
}

function canBeCause(tag) {
  const r = tagRoles[tag];
  return !r || r==='cause' || r==='both';
}
function canBeEffect(tag) {
  const r = tagRoles[tag];
  return !r || r==='effect' || r==='both';
}

// ── Spearman rank correlation ────────────────────────────
function spearman(xs, ys) {
  // Spearman rank correlation with proper tied-rank averaging
  const n = xs.length;
  if(n < 3) return null;

  const rank = arr => {
    // Build sorted index list
    const sorted = [...arr].map((v,i)=>({v,i})).sort((a,b)=>a.v-b.v);
    const r = new Array(n);
    let i = 0;
    while(i < n) {
      // Find run of equal values (ties)
      let j = i;
      while(j < n && sorted[j].v === sorted[i].v) j++;
      // Average rank for this tie group (ranks are 1-indexed)
      const avgRank = (i + 1 + j) / 2;
      for(let k = i; k < j; k++) r[sorted[k].i] = avgRank;
      i = j;
    }
    return r;
  };

  const rx = rank(xs), ry = rank(ys);

  // Use Pearson formula on ranks (more accurate than d² formula under ties)
  const mean = arr => arr.reduce((a,b)=>a+b,0)/n;
  const mx = mean(rx), my = mean(ry);
  let num=0, dx2=0, dy2=0;
  for(let i=0;i<n;i++){
    const dx=rx[i]-mx, dy=ry[i]-my;
    num+=dx*dy; dx2+=dx*dx; dy2+=dy*dy;
  }
  const denom = Math.sqrt(dx2*dy2);
  if(!denom) return null; // no variance in one variable
  return num/denom;
}

function computeCorrelationsWithLag(lag) {
  // Wrapper that runs computeCorrelations with a specific lag without touching global state
  const prev = corrLag;
  corrLag = lag;
  const result = computeCorrelations();
  corrLag = prev;
  return result;
}

function computeCorrelations() {
  // Build per-day structures using LOCAL dates (timezone-safe)
  const byDate = {};    // localDay -> { tag -> earliestMs }
  const numByDate = {}; // localDay -> { tag -> numeric value }
  for(const e of entries){
    const day = localDay(e.timestamp);
    const ms = new Date(e.timestamp).getTime();
    if(!byDate[day]) byDate[day] = {};
    if(!numByDate[day]) numByDate[day] = {};
    for(const t of e.tags){
      if(byDate[day][t] === undefined || ms < byDate[day][t])
        byDate[day][t] = ms;
      if(e.numericValues && e.numericValues[t] !== undefined)
        numByDate[day][t] = e.numericValues[t];
    }
  }

  // causeDay -> effectDay (lag applied to effect lookup)
  // For lag=0: effect looked up on same day; lag=1: effect looked up on next day, etc.
  const lag = corrLag;
  const days = Object.keys(byDate).sort();
  const tags = [...new Set(entries.flatMap(e=>e.tags))];
  if(tags.length < 2 || days.length < 2) return [];

  const results = [];

  for(let i=0;i<tags.length;i++){
    for(let j=0;j<tags.length;j++){
      if(i===j) continue;
      const a=tags[i], b=tags[j];
      if(!canBeCause(a) || !canBeEffect(b)) continue;

      const aNum = isNumericTag(a);
      const bNum = isNumericTag(b);

      if(!aNum && !bNum) {
        // ── Binary → Binary: directional phi with lag ──
        // For lag=0: same-day, cause must precede effect within the day
        // For lag>0: a present on causeDay, b present on causeDay+lag
        let n11=0,n10=0,n01=0,n00=0;
        for(const causeDay of days){
          const effectDay = lag===0 ? causeDay : addDays(causeDay, lag);
          const tA = byDate[causeDay][a];
          const tB = byDate[effectDay] ? byDate[effectDay][b] : undefined;
          const aPresent = tA !== undefined;
          const bPresent = tB !== undefined;
          // For same-day: require b after a in time. For cross-day: just presence.
          const bCounts = lag===0
            ? (tA!==undefined && tB!==undefined && tB>tA)
            : bPresent;
          if(aPresent && bCounts)         n11++;
          else if(aPresent && !bCounts)   n10++;
          else if(!aPresent && bPresent)  n01++;
          else                            n00++;
        }
        const denom=Math.sqrt((n11+n10)*(n01+n00)*(n11+n01)*(n10+n00));
        if(!denom) continue;
        const phi=(n11*n00-n10*n01)/denom;
        results.push({a,b,phi,coOccurrences:n11,type:'bin-bin'});

      } else if(aNum && bNum) {
        // ── Numeric → Numeric: Spearman with lag ──
        const xs=[], ys=[];
        for(const causeDay of days){
          const effectDay = lag===0 ? causeDay : addDays(causeDay, lag);
          const va = numByDate[causeDay][a];
          const vb = numByDate[effectDay] ? numByDate[effectDay][b] : undefined;
          if(va!==undefined && vb!==undefined){ xs.push(va); ys.push(vb); }
        }
        const r=spearman(xs,ys);
        if(r===null) continue;
        results.push({a,b,phi:r,coOccurrences:xs.length,type:'num-num'});

      } else {
        // ── Numeric ↔ Binary: Spearman with lag ──
        const numTag=aNum?a:b, binTag=aNum?b:a;
        // numTag is always the cause side (a), binTag is effect side (b) if aNum
        // if !aNum then binTag=a (cause), numTag=b (effect)
        const xs=[], ys=[];
        for(const causeDay of days){
          const effectDay = lag===0 ? causeDay : addDays(causeDay, lag);
          if(aNum){
            // cause=numeric on causeDay, effect=binary on effectDay
            const nv = numByDate[causeDay][numTag];
            if(nv===undefined) continue;
            const present = (byDate[effectDay] && byDate[effectDay][binTag]!==undefined) ? 1 : 0;
            xs.push(nv); ys.push(present);
          } else {
            // cause=binary on causeDay, effect=numeric on effectDay
            const present = byDate[causeDay][binTag]!==undefined ? 1 : 0;
            const nv = numByDate[effectDay] ? numByDate[effectDay][numTag] : undefined;
            if(nv===undefined) continue;
            xs.push(present); ys.push(nv);
          }
        }
        const r=spearman(xs,ys);
        if(r===null) continue;
        const binValues = aNum ? ys : xs;
        const binaryVariance = binValues.some(v=>v===0) && binValues.some(v=>v===1);
        results.push({a,b,phi:r,coOccurrences:xs.length,type:aNum?'num-bin':'bin-num',binaryVariance});
      }
    }
  }
  return results.sort((x,y)=>Math.abs(y.phi)-Math.abs(x.phi));
}

    }

    ? entries.filter(e=>e.tags.some(t=>tagCategory(t)===filterCat))

            <button class="del-btn" onclick="deleteEntry('${e.id}')">✕</button>
          </div>
        </div>

  `).join('');
}

  const tagRow = (t) => {
    const cat = tagCategory(t) || '';
    const col = categoryColor(cat);

          ? `<img src="${img}" style="width:38px;height:38px;border-radius:4px;object-fit:cover;border:1px solid #2a3a55;flex-shrink:0"/>`
          : `<span style="width:12px;height:12px;border-radius:50%;border:1px solid;${dotStyle};display:inline-block;flex-shrink:0"></span>`}
        <span class="tags-row-name" style="${col?`color:${col}`:''}">
          ${escHtml(t)}${roleLabel(t)}${sentimentBadge(tagSentiment(t))}
        </span>
        <span style="color:#2a4060;font-size:10px;flex-shrink:0">${counts[t]||0}×</span>
      </span>
      <span style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <input class="input-field" placeholder="category…" value="${escHtml(cat)}"
          style="width:110px;padding:3px 8px;font-size:11px"
          onchange="setTagMeta('${escHtml(t)}','cat',this.value.trim().toLowerCase())"
          onkeydown="if(event.key==='Enter'){setTagMeta('${escHtml(t)}','cat',this.value.trim().toLowerCase());this.blur()}"

          title="Type a category name (e.g. food, mood, activity)"/>
        <label title="Upload image (max 200 KB)" style="cursor:pointer">
          <input type="file" accept="image/*" style="display:none" onchange="handleTagImageUpload('${escHtml(t)}',this)"/>
          <span class="io-btn" style="padding:2px 8px;font-size:10px;pointer-events:none">📷</span>
        </label>
        ${img ? `<button class="role-btn" onclick="setTagMeta('${escHtml(t)}','img',null)" title="Remove image" style="color:#ff6b6b;border-color:#3a2030;font-size:10px">✕</button>` : ''}
        ${renderNumericRangeBtn(t)}
      </span>
      <span style="display:flex;gap:3px;flex-shrink:0">${roleBtns(t,'tags')}</span>
      <span style="display:flex;gap:2px;flex-shrink:0">${sentimentBtns(t)}</span>
    </div>`;
  };

  // Build datalist of existing categories for autocomplete
  const existingCats = allCategories();
  const datalist = `<datalist id="cat-datalist">${existingCats.map(c=>`<option value="${escHtml(c)}">`).join('')}</datalist>`;

  el.innerHTML = datalist + sortedCats.map(cat => {
    const col = cat ? categoryColor(cat) : null;
    const header = cat
      ? `<div class="cat-group-header" style="color:${col};border-color:${col};background:rgba(${hexToRgb(col)},0.06)">${escHtml(cat)}</div>`
      : `<div class="cat-group-header" style="color:#2a4060;border-color:#2a4060">uncategorised</div>`;
    return header + groups[cat].map(tagRow).join('');
  }).join('') + `
    <div style="margin-top:20px;padding:12px 14px;background:rgba(0,170,255,0.03);border:1px solid #1a2535;border-radius:3px;color:#3a5570;font-size:11px;line-height:1.8">
      Type a category to group tags — all tags in a category share a color. Categories appear as filters in Correlations.
      Click <strong style="color:#c4a0ff"># numeric</strong> to make a tag numeric — set its min/max range. Then log values inline as <code>mood:75</code> or via the slider that appears after logging.
      <br><span class="role-badge role-cause">C</span> Cause ·
      <span class="role-badge role-effect">E</span> Effect ·
      <span class="role-badge role-both">~</span> Both · unset = both ·
      <span style="color:#c4a0ff">#</span> = numeric ·
      😊😐😞 = effect sentiment (scores causes: impact = Σ φ × sentiment, same-day / lag-1)
    </div>`;
}

function setNumericDef(tag, min, max, step) {

}

}

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function sortCorrs(corrs) {
  const {col, dir} = corrSort;
  return [...corrs].sort((x,y)=>{
    let av, bv;
    if(col==='phi'){ av=Math.abs(x.phi); bv=Math.abs(y.phi); }
    else if(col==='a'){ av=x.a; bv=y.a; }
    else if(col==='b'){ av=x.b; bv=y.b; }
    else { av=x.coOccurrences; bv=y.coOccurrences; }
    if(av<bv) return dir==='asc'?-1:1;
    if(av>bv) return dir==='asc'?1:-1;
    return 0;
  });
}

function setSort(col) {
  if(corrSort.col===col){ corrSort.dir = corrSort.dir==='desc'?'asc':'desc'; }
  else { corrSort = {col, dir: col==='a'||col==='b' ? 'asc' : 'desc'}; }
  renderCorrelations();
}

function renderCorrelations() {
  const el = document.getElementById('corr-content');
  if(entries.length < 4){
    el.innerHTML = '<div class="empty">Log at least a few days of entries across multiple tags to see correlations.</div>';
    return;
  }

  const allCorrs = computeCorrelations();
  const cats = allCategories();
  const arrow = col => {
    if(corrSort.col!==col) return '<span style="color:#1a2a3a">↕</span>';
    return corrSort.dir==='desc'?'↓':'↑';
  };

  let visible = allCorrs.filter(c => {
    if(Math.abs(c.phi) < corrMin) return false;
    if(c.coOccurrences < corrMinDays) return false;
    if(corrRequireVariance && c.binaryVariance === false) return false;
    if(corrSearch){ const s=corrSearch.toLowerCase(); if(!c.a.includes(s)&&!c.b.includes(s)) return false; }
    if(corrCatA && tagCategory(c.a) !== corrCatA) return false;
    if(corrCatB && tagCategory(c.b) !== corrCatB) return false;
    return true;
  });
  visible = sortCorrs(visible);

  const catChips = (side) => {
    if(!cats.length) return '';
    const cur = side==='a' ? corrCatA : corrCatB;
    const chips = cats.map(c=>{
      const col = categoryColor(c);
      const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
      const active = cur===c;
      return `<span class="cat-chip ${active?'active':''}"
        style="background:rgba(${r},${g},${b},${active?0.2:0.07});border-color:rgba(${r},${g},${b},${active?0.6:0.15});color:${col}"
        onclick="${side==='a'?'corrCatA':'corrCatB'}='${active?'':escHtml(c)}';renderCorrelations()">${escHtml(c)}</span>`;
    }).join('');
    return `<span style="color:#2a4060;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;margin-right:2px">${side==='a'?'cause':'effect'}:</span>${chips}`;
  };

  el.innerHTML = `
    <div class="corr-controls">
      <div class="ctrl-group">
        <span style="color:#4a6080;font-size:11px;white-space:nowrap">min |φ|</span>
        <input type="range" min="0" max="100" value="${corrMin*100}"
          oninput="document.getElementById('corr-min-val').textContent=(this.value/100).toFixed(2)"
          onchange="corrMin=this.value/100;renderCorrelations()"/>
        <span id="corr-min-val" style="color:#7dd3fc;font-size:11px;min-width:28px">${corrMin.toFixed(2)}</span>
      </div>
      <div class="ctrl-group">
        <span style="color:#4a6080;font-size:11px;white-space:nowrap">min days</span>
        <input type="range" min="1" max="20" value="${corrMinDays}"
          oninput="document.getElementById('corr-min-days-val').textContent=this.value"
          onchange="corrMinDays=+this.value;renderCorrelations()"/>
        <span id="corr-min-days-val" style="color:#7dd3fc;font-size:11px;min-width:18px">${corrMinDays}</span>
      </div>
      <div class="ctrl-group">
        <span style="color:#4a6080;font-size:11px;white-space:nowrap">lag</span>
        <input type="range" min="0" max="7" value="${corrLag}"
          oninput="document.getElementById('corr-lag-val').textContent=this.value=='0'?'same day':this.value+'d'"
          onchange="corrLag=+this.value;renderCorrelations()"/>
        <span id="corr-lag-val" style="color:#7dd3fc;font-size:11px;min-width:50px">${corrLag===0?'same day':corrLag+'d'}</span>
      </div>
      <label class="ctrl-group" style="cursor:pointer;color:#4a6080;font-size:11px;user-select:none;white-space:nowrap" title="Hide numeric↔binary pairs where the binary tag was always present or always absent">
        <input type="checkbox" ${corrRequireVariance?'checked':''} onchange="corrRequireVariance=this.checked;renderCorrelations()" style="accent-color:#00d4ff;cursor:pointer;width:auto;height:auto;flex-shrink:0"/>
        require variance
      </label>
      <div class="ctrl-group" style="flex:1;min-width:160px">
        <input class="corr-search" placeholder="🔍 filter by tag…" value="${escHtml(corrSearch)}"
          oninput="corrSearch=this.value;_debouncedRenderCorr()" style="width:100%"/>
        <span style="color:#2a4060;font-size:11px;white-space:nowrap">${visible.length}p</span>
      </div>
    </div>
    ${cats.length ? `<div style="margin-bottom:10px;display:flex;flex-direction:column;gap:5px">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">${catChips('a')}</div>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">${catChips('b')}</div>
    </div>` : ''}
    <div class="corr-table">
      <div class="corr-header corr-cols corr-row">
        <span class="corr-cell-a" onclick="setSort('a')" class="${corrSort.col==='a'?'sort-active':''}">cause ${arrow('a')}</span>
        <span></span>
        <span class="corr-cell-b" onclick="setSort('b')" class="${corrSort.col==='b'?'sort-active':''}">effect ${arrow('b')}</span>
        <span class="corr-cell-phi" onclick="setSort('phi')" class="${corrSort.col==='phi'?'sort-active':''}">φ / ρ ${arrow('phi')}</span>
        <span class="corr-cell-bar">bar</span>
        <span class="corr-cell-days" onclick="setSort('n')" class="${corrSort.col==='n'?'sort-active':''}">days ${arrow('n')}</span>
        <span class="corr-cell-type">type</span>
      </div>
      ${visible.length===0
        ? '<div class="empty" style="padding:30px 10px">No pairs match the current filters.</div>'
        : visible.slice(0,120).map(({a,b,phi,coOccurrences,type})=>{
          const col = phiColor(phi);
          const barLeft = phi>=0 ? 50 : 50+phi*50;
          const barW = Math.abs(phi)*50;
          const typeBadge = type==='num-num'
            ? `<span class="corr-type" style="background:rgba(200,160,255,0.12);color:#c4a0ff;border:1px solid rgba(200,160,255,0.25)" title="Spearman: numeric→numeric">#→#</span>`
            : type==='num-bin'
            ? `<span class="corr-type" style="background:rgba(255,180,80,0.12);color:#ffb74d;border:1px solid rgba(255,180,80,0.25)" title="Spearman: numeric→binary">#→○</span>`
            : type==='bin-num'
            ? `<span class="corr-type" style="background:rgba(80,200,255,0.12);color:#4fc3f7;border:1px solid rgba(80,200,255,0.25)" title="Spearman: binary→numeric">○→#</span>`
            : `<span class="corr-type" style="background:rgba(100,160,100,0.1);color:#81c784;border:1px solid rgba(100,160,100,0.2)" title="Phi: binary→binary">○→○</span>`;
          const statLabel = (type&&type!=='bin-bin') ? 'ρ' : 'φ';
          return `<div class="corr-row corr-cols">
            <span class="corr-cell-a tag-pill" style="cursor:default;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;min-width:0;${tagPillStyle(a)}" title="${escHtml(a)}">${tagVisualPrefix(a)}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(a)}</span></span>
            <span class="arrow-col">→</span>
            <span class="corr-cell-b tag-pill" style="cursor:default;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;min-width:0;${tagPillStyle(b)}" title="${escHtml(b)}">${tagVisualPrefix(b)}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(b)}</span></span>
            <span class="corr-cell-phi phi-val" style="color:${col}">${phi>0?'+':''}${phi.toFixed(3)}<span style="font-size:9px;opacity:0.6;margin-left:2px">${statLabel}</span></span>
            <div class="corr-cell-bar bar-wrap">
              <div class="bar-bg"></div>
              <div class="bar-fill" style="background:${col};left:${barLeft}%;width:${barW}%"></div>
              <div class="bar-center"></div>
            </div>
            <span class="corr-cell-days" style="color:#4a6080;font-size:11px;text-align:right">${coOccurrences}d</span>
            <span class="corr-cell-type">${typeBadge}</span>
          </div>`;
        }).join('')
      }
    </div>
    <div class="corr-info">
      <span style="color:#00d4ff">○→○ φ (phi)</span>: binary→binary directional — days where cause logged <strong>before</strong> effect. ·
      <span style="color:#c4a0ff">#→# ρ</span>: numeric→numeric Spearman rank. ·
      <span style="color:#ffb74d">#→○ ρ</span>: numeric value vs. binary presence. ·
      <span style="color:#4fc3f7">○→# ρ</span>: binary presence vs. numeric value.<br>
      <span style="color:#00ff9d">+1.0</span> = strong positive · <span style="color:#ff4d6d">−1.0</span> = strong negative · <span style="color:#8892a4">0</span> = no pattern.
    </div>
  `;
}

function renderHeatmap() {
  const el = document.getElementById('heatmap-content');
  const tags = allTags();
  if(!tags.length){ el.innerHTML='<div class="empty">Log some entries first.</div>'; return; }

  // Auto-select first tag if none chosen or chosen tag no longer exists
  if(!profileTag || !tags.includes(profileTag)) profileTag = tags[0];

  // ── Tag picker — compact dropdown ──
  const pickerHtml = `<div class="profile-tag-picker">
    <span style="color:#2a4060;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0">tag</span>
    <select class="profile-select" onchange="profileTag=this.value;renderHeatmap()">
      ${tags.map(t=>`<option value="${escHtml(t)}" ${t===profileTag?'selected':''}>${t}</option>`).join('')}
    </select>
  </div>`;

  // ── Gather entries for this tag ──
  const tagEntries = entries.filter(e => e.tags.includes(profileTag));
  const total = tagEntries.length;
  if(!total){
    el.innerHTML = pickerHtml + '<div class="empty">No entries for this tag yet.</div>';
    return;
  }

  const col = tagColor(profileTag) || '#00d4ff';

  // ── Hour of day counts ──
  const hourCounts = Array(24).fill(0);
  tagEntries.forEach(e => hourCounts[getHour(e.timestamp)]++);
  const maxHour = Math.max(...hourCounts, 1);

  // ── Day of week counts (0=Sun … 6=Sat) ──
  const dowCounts = Array(7).fill(0);
  const dowLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  tagEntries.forEach(e => dowCounts[new Date(e.timestamp).getDay()]++);
  const maxDow = Math.max(...dowCounts, 1);

  // ── Time-of-day bucket counts ──
  const buckets = {morning:0, afternoon:0, evening:0, night:0};
  tagEntries.forEach(e => {
    const h = getHour(e.timestamp);
    if(h>=6&&h<12) buckets.morning++;
    else if(h>=12&&h<17) buckets.afternoon++;
    else if(h>=17&&h<22) buckets.evening++;
    else buckets.night++;
  });
  const maxBucket = Math.max(...Object.values(buckets), 1);
  const bucketLabels = {morning:'Morning (6–12)', afternoon:'Afternoon (12–17)', evening:'Evening (17–22)', night:'Night (22–6)'};

  // ── Weekend vs weekday ──
  let weekend=0, weekday=0;
  tagEntries.forEach(e => {
    const d = new Date(e.timestamp).getDay();
    (d===0||d===6) ? weekend++ : weekday++;
  });
  const totalDays = [...new Set(tagEntries.map(e=>localDay(e.timestamp)))].length;
  const allDays   = [...new Set(entries.map(e=>localDay(e.timestamp)))].length;

  // ── Numeric stats ──
  const numDef = tagNumericDef(profileTag);
  const numVals = numDef ? tagEntries.flatMap(e => {
    const v = entryNumVal(e, profileTag);
    return v!==undefined ? [{v, day:localDay(e.timestamp), ts:e.timestamp}] : [];
  }).sort((a,b)=>a.ts.localeCompare(b.ts)) : [];

  // ── Correlations ──
  const corrSame = computeCorrelationsWithLag(0)
    .filter(p=>(p.a===profileTag||p.b===profileTag))
    .sort((a,b)=>Math.abs(b.phi)-Math.abs(a.phi)).slice(0,6);
  const lag1All = computeCorrelationsWithLag(1);
  // "predicts tomorrow" — this tag is cause (a), effect happens next day
  const corrPredicts = lag1All
    .filter(p=>p.a===profileTag)
    .sort((a,b)=>Math.abs(b.phi)-Math.abs(a.phi)).slice(0,6);
  // "predicted by yesterday" — this tag is effect (b), cause happened day before
  const corrPredictedBy = lag1All
    .filter(p=>p.b===profileTag)
    .sort((a,b)=>Math.abs(b.phi)-Math.abs(a.phi)).slice(0,6);

  // ── Render helpers ──
  const barRow = (label, val, maxVal, accent) => {
    const pct = Math.round(val/maxVal*100);
    const accentCol = accent || col;
    const r=parseInt(accentCol.slice(1,3),16)||0, g=parseInt(accentCol.slice(3,5),16)||180, b=parseInt(accentCol.slice(5,7),16)||255;
    return `<div class="profile-bar-row">
      <span class="profile-bar-label">${label}</span>
      <div class="profile-bar-track">
        <div class="profile-bar-fill" style="width:${pct}%;background:rgba(${r},${g},${b},0.7)"></div>
      </div>
      <span class="profile-bar-val">${val}</span>
    </div>`;
  };

  const corrRows = (pairs) => pairs.length ? pairs.map(({a,b,phi,coOccurrences}) => {
    const isA = a===profileTag;
    const other = isA?b:a;
    const direction = isA?'→':'←';
    const pc = phiColor(phi);
    const low = coOccurrences < 7;
    return `<div class="tag-corr-row" style="${low?'opacity:0.6':''}">
      <span style="color:#2a4060;font-size:10px;width:14px;flex-shrink:0">${direction}</span>
      <span class="tag-corr-name" style="${tagPillStyle(other)}">${tagVisualPrefix(other)}${escHtml(other)}</span>
      <span style="color:#2a4060;font-size:10px;flex-shrink:0">${coOccurrences}d</span>
      <span class="tag-corr-phi" style="color:${pc}">${low?'<span class="corr-warn" title="Low sample">!</span> ':''}${phi>0?'+':''}${phi.toFixed(2)}</span>
    </div>`;
  }).join('') : '<div style="color:#2a4060;font-size:11px">Not enough data yet.</div>';

  // ── Heatmap (24h for this tag only) ──
  const cellW=26, gap=2;
  const hmCols = `90px repeat(24,${cellW}px)`;
  const hourLabels = Array.from({length:24},(_,h)=>
    `<div style="color:${h%3===0?'#4a6a8a':'#1a2535'};font-size:${h%6===0?'10':'9'}px;text-align:center;font-weight:${h%6===0?600:400}">${h%3===0?h+'h':''}</div>`
  ).join('');
  const hmCells = hourCounts.map((val,h)=>{
    const intensity=val/maxHour;
    const r2=parseInt(col.slice(1,3),16)||0, g2=parseInt(col.slice(3,5),16)||180, b2=parseInt(col.slice(5,7),16)||255;
    const bg=val===0?'#0d1420':`rgba(${r2},${g2},${b2},${(0.12+intensity*0.88).toFixed(2)})`;
    const txt=val>0?`<span style="font-size:9px;color:${intensity>0.5?'#fff':col};opacity:0.95">${val}</span>`:'';
    return `<div class="heat-cell" title="${h}:00 — ${val}×" style="width:${cellW}px;height:24px;background:${bg}">${txt}</div>`;
  }).join('');

  // ── Sparkline for numeric values ──
  const sparkline = numVals.length >= 2 ? (() => {
    const W=340, H=60, pad=6;
    const vals = numVals.map(x=>x.v);
    const mn=Math.min(...vals), mx=Math.max(...vals), range=mx-mn||1;
    const pts = vals.map((v,i)=>{
      const x = pad + (i/(vals.length-1))*(W-2*pad);
      const y = H-pad - ((v-mn)/range)*(H-2*pad);
      return `${x},${y}`;
    }).join(' ');
    const r2=parseInt(col.slice(1,3),16)||0, g2=parseInt(col.slice(3,5),16)||180, b2=parseInt(col.slice(5,7),16)||255;
    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;margin-top:8px">
      <polyline points="${pts}" fill="none" stroke="rgba(${r2},${g2},${b2},0.8)" stroke-width="2" stroke-linejoin="round"/>
      ${vals.map((v,i)=>{
        const x=pad+(i/(vals.length-1))*(W-2*pad);
        const y=H-pad-((v-mn)/range)*(H-2*pad);
        return `<circle cx="${x}" cy="${y}" r="3" fill="rgba(${r2},${g2},${b2},0.9)"><title>${numVals[i].day}: ${v}</title></circle>`;
      }).join('')}
    </svg>`;
  })() : '';

  // ── Assemble ──
  const numericSection = numDef && numVals.length ? `
    <div class="profile-card" style="grid-column:1/-1">
      <div class="profile-card-label">numeric values (${numVals.length} readings)</div>
      <div style="display:flex;gap:24px;font-size:12px;margin-bottom:4px">
        <span style="color:#4a6080">avg <span style="color:${col};font-weight:600">${(numVals.reduce((s,x)=>s+x.v,0)/numVals.length).toFixed(1)}</span></span>
        <span style="color:#4a6080">min <span style="color:${col};font-weight:600">${Math.min(...numVals.map(x=>x.v))}</span></span>
        <span style="color:#4a6080">max <span style="color:${col};font-weight:600">${Math.max(...numVals.map(x=>x.v))}</span></span>
        <span style="color:#4a6080">range <span style="color:${col};font-weight:600">${numDef.min}–${numDef.max}</span></span>
      </div>
      ${sparkline}
    </div>` : '';

  el.innerHTML = pickerHtml + `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap">
      <span style="font-size:22px;font-weight:700;color:${col}">${tagVisualPrefix(profileTag)}${escHtml(profileTag)}</span>
      ${roleLabel(profileTag)}
      <span style="color:#2a4060;font-size:12px">${total} log${total===1?'':' entries'} across ${totalDays} day${totalDays===1?'':' days'}</span>
      <span style="color:#2a4060;font-size:12px">(${Math.round(totalDays/Math.max(allDays,1)*100)}% of tracked days)</span>
    </div>

    ${(() => {
      // Impact score — only meaningful if tag can be a cause
      const imp0 = computeCauseScore(profileTag, 0);
      const imp1 = computeCauseScore(profileTag, 1);
      if(imp0===null && imp1===null) return '';
      const combined = (imp0!==null && imp1!==null) ? (imp0+imp1)/2 : (imp0??imp1);
      const col2 = combined>0.1?'#00ff9d':combined<-0.1?'#ff4d6d':'#8892a4';
      const fmt = v => {
        if(v===null) return '<span style="color:#2a4060">—</span>';
        const vc = v>0.1?'#00ff9d':v<-0.1?'#ff4d6d':'#8892a4';
        return `<span style="color:${vc};font-weight:600">${v>0?'+':''}${v.toFixed(2)}</span>`;
      };
      return `<div class="profile-card" style="margin-bottom:16px;grid-column:1/-1;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div>
          <div class="profile-card-label">impact score</div>
          <div style="font-size:28px;font-weight:700;color:${col2};line-height:1">${combined>0?'+':''}${combined.toFixed(2)}</div>
          <div style="color:#2a4060;font-size:10px;margin-top:4px">Σ(φ × effect_sentiment × confidence)</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="color:#2a4060;font-size:11px;min-width:80px">same day</span>
            ${fmt(imp0)}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="color:#2a4060;font-size:11px;min-width:80px">lag 1 day</span>
            ${fmt(imp1)}
          </div>
        </div>
        <div style="color:#2a4060;font-size:10px;max-width:240px;line-height:1.6">
          Based on correlations with sentiment-tagged effects.<br>
          Tag effects 😊/😞 in the Tags screen to populate this.
        </div>
      </div>`;
    })()}

    <div class="profile-grid">
      ${numericSection}

      <div class="profile-card">
        <div class="profile-card-label">time of day</div>
        ${['morning','afternoon','evening','night'].map(k=>barRow(bucketLabels[k].split(' ')[0], buckets[k], total)).join('')}
      </div>

      <div class="profile-card">
        <div class="profile-card-label">day of week</div>
        ${dowLabels.map((d,i)=>barRow(d, dowCounts[i], maxDow)).join('')}
      </div>

      <div class="profile-card">
        <div class="profile-card-label">weekday vs weekend</div>
        ${barRow('Weekday', weekday, total)}
        ${barRow('Weekend', weekend, total)}
        <div style="color:#2a4060;font-size:10px;margin-top:6px">
          weekday avg: ${allDays>0?(weekday/Math.max(allDays*5/7,1)).toFixed(2):'—'}/day ·
          weekend avg: ${allDays>0?(weekend/Math.max(allDays*2/7,1)).toFixed(2):'—'}/day
        </div>
      </div>

      <div class="profile-card">
        <div class="profile-card-label">correlations — same day</div>
        ${corrRows(corrSame)}
      </div>

      <div class="profile-card">
        <div class="profile-card-label">→ predicts tomorrow</div>
        <div style="color:#2a4060;font-size:10px;margin-bottom:8px">this tag on day N → effect on day N+1</div>
        ${corrRows(corrPredicts)}
      </div>

      <div class="profile-card">
        <div class="profile-card-label">← predicted by yesterday</div>
        <div style="color:#2a4060;font-size:10px;margin-bottom:8px">cause on day N-1 → this tag on day N</div>
        ${corrRows(corrPredictedBy)}
      </div>
    </div>

    <div class="profile-card" style="margin-bottom:20px">
      <div class="profile-card-label">hour of day heatmap</div>
      <div class="heat-grid" style="margin-top:4px">
        <div style="display:grid;grid-template-columns:${hmCols};gap:${gap}px;margin-bottom:4px;align-items:end">
          <div></div>${hourLabels}
        </div>
        <div style="display:grid;grid-template-columns:${hmCols};gap:${gap}px;align-items:center">
          <div style="color:${col};font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(profileTag)}</div>
          ${hmCells}
        </div>
      </div>
    </div>
  `;
}

// ── Export ──────────────────────────────────────────────
function exportData() {
  const payload = {
    version: 2,
    exportedAt: new Date().toISOString(),
    entries: entries,
    tagRoles: tagRoles,
    tagMeta: tagMeta
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `correl-diary-backup-${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✓ exported ${entries.length} entries`, 'green');
}

// ── Import ──────────────────────────────────────────────
function importData(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      // Accept both {version,entries:[]} and raw array formats
      const incoming = Array.isArray(data) ? data : (data.entries || []);
      if(!Array.isArray(incoming)) throw new Error('Invalid format');
      const valid = incoming.filter(x => x.id && x.timestamp && Array.isArray(x.tags));
      if(valid.length === 0) { showToast('✕ no valid entries found', 'red'); return; }
      const existingIds = new Set(entries.map(x=>x.id));
      const newEntries = valid.filter(x=>!existingIds.has(x.id));
      const merged = [...entries, ...newEntries].sort((a,b)=>b.timestamp.localeCompare(a.timestamp));
      entries = merged;
      // Merge tagRoles if present in backup
      if(data.tagRoles && typeof data.tagRoles==='object'){
        tagRoles = {...data.tagRoles, ...tagRoles};
      }
      if(data.tagMeta && typeof data.tagMeta==='object'){
        tagMeta = {...data.tagMeta, ...tagMeta};
      }
      save();
      render();
      showToast(`✓ imported ${newEntries.length} new entries (${valid.length - newEntries.length} duplicates skipped)`, 'green');
    } catch(err) {
      showToast('✕ could not read file — make sure it\'s a CORRELdiary export', 'red');
    }
    // Reset file input so the same file can be re-imported if needed
    event.target.value = '';
  };
  reader.readAsText(file);
}

function showToast(msg, type) {
  const t = document.getElementById('import-toast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.opacity = '1';
  t.style.borderColor = type==='green' ? '#00ff9d' : '#ff4d6d';
  t.style.color = type==='green' ? '#00ff9d' : '#ff4d6d';
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.style.display='none', 400); }, 3000);
}

// init
render();
</script>
