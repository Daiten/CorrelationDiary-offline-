<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>◈ CORRELdiary</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:#0d1420;}
  ::-webkit-scrollbar-thumb{background:#2a3a55;}
  body{background:#080c12;color:#c8d4e8;font-family:'JetBrains Mono','Fira Mono','Courier New',monospace;font-size:13px;min-height:100vh;}
  .header{border-bottom:1px solid #1a2535;padding:16px 24px 0;position:sticky;top:0;background:#080c12;z-index:10;}
  .header-top{display:flex;align-items:baseline;gap:16px;margin-bottom:12px;}
  .logo{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:#00d4ff;letter-spacing:-0.02em;}
  .subtitle{color:#2a3a55;font-size:11px;}
  .stats{margin-left:auto;color:#2a3a55;font-size:11px;}
  .nav{display:flex;gap:2px;}
  .nav-btn{background:none;border:none;cursor:pointer;padding:8px 18px;font-family:inherit;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#4a6080;transition:all 0.2s;border-bottom:2px solid transparent;}
  .nav-btn.active{color:#00d4ff;border-bottom-color:#00d4ff;}
  .nav-btn:hover{color:#a0c4e0;}
  .main{max-width:900px;margin:0 auto;padding:24px 20px;}
  .section-label{color:#2a4060;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
  .input-row{display:flex;gap:10px;margin-bottom:10px;}
  .input-field{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:#e0eaf8;font-family:inherit;font-size:13px;padding:10px 14px;width:100%;outline:none;transition:border-color 0.2s;}
  .input-field:focus{border-color:#00aaff;}
  .log-btn{background:#003d6b;border:1px solid #0077cc;color:#7dd3fc;font-family:inherit;font-size:12px;letter-spacing:0.08em;padding:10px 22px;border-radius:3px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .log-btn:hover{background:#005099;}
  .log-btn.flash{background:#007744;border-color:#00ff9d;color:#00ff9d;}
  .chips{margin-bottom:24px;}
  .suggest-chip{display:inline-block;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:2px;padding:2px 8px;margin:2px;font-size:11px;color:#556a85;cursor:pointer;transition:all 0.15s;}
  .suggest-chip:hover{border-color:#0077aa;color:#7dd3fc;background:rgba(0,120,200,0.1);}
  .tag-pill{display:inline-block;background:rgba(0,180,255,0.1);border:1px solid rgba(0,180,255,0.25);border-radius:2px;padding:1px 7px;margin:2px 3px 2px 0;font-size:11px;color:#7dd3fc;cursor:pointer;transition:all 0.15s;}
  .tag-pill:hover{background:rgba(0,180,255,0.2);}
  .tag-pill.active{background:rgba(0,180,255,0.3);border-color:#38bdf8;color:#e0f2fe;}
  .filter-section{margin-bottom:20px;}
  .day-header{color:#2a4a6a;font-size:11px;letter-spacing:0.12em;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
  .day-line{flex:1;border-bottom:1px solid #111d2c;}
  .entry-row{display:flex;align-items:flex-start;gap:12px;padding:8px 10px;border-left:2px solid #1a2535;margin-bottom:4px;border-radius:0 3px 3px 0;transition:background 0.15s;}
  .entry-row:hover{background:rgba(255,255,255,0.03);}
  .entry-time{color:#2a4a6a;min-width:42px;padding-top:2px;}
  .entry-tags{flex:1;}
  .entry-actions{display:flex;}
  .del-btn{background:none;border:none;color:#3a4a60;cursor:pointer;font-size:14px;padding:2px 6px;transition:color 0.15s;}
  .del-btn:hover{color:#ff4d6d;}
  .edit-btn{background:none;border:none;color:#3a4a60;cursor:pointer;font-size:12px;padding:2px 6px;transition:color 0.15s;font-family:inherit;}
  .edit-btn:hover{color:#ffd700;}
  .edit-row{display:flex;gap:8px;}
  .save-btn{background:#003d6b;border:1px solid #0077cc;color:#7dd3fc;font-family:inherit;font-size:11px;padding:5px 12px;border-radius:3px;cursor:pointer;}
  .empty{color:#2a3a55;text-align:center;padding:60px 0;}
  /* correlations */
  .corr-controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .corr-search{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:#e0eaf8;font-family:inherit;font-size:12px;padding:6px 12px;outline:none;transition:border-color 0.2s;width:180px;}
  .corr-search:focus{border-color:#00aaff;}
  .corr-table{display:grid;gap:1px;}
  .corr-cols{grid-template-columns:140px 18px 140px 100px 1fr 52px;}
  .corr-header{display:grid;gap:8px;padding:6px 10px;color:#2a4060;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid #1a2535;}
  .corr-header span{cursor:pointer;user-select:none;transition:color 0.15s;}
  .corr-header span:hover{color:#7dd3fc;}
  .corr-header span.sort-active{color:#00d4ff;}
  .corr-row{display:grid;gap:8px;padding:7px 10px;align-items:center;transition:background 0.15s;}
  .corr-row:hover{background:rgba(255,255,255,0.03);}
  .phi-val{font-weight:600;font-size:13px;}
  .bar-wrap{position:relative;height:6px;}
  .bar-bg{position:absolute;left:0;right:0;top:0;height:100%;background:#1a2535;}
  .bar-fill{position:absolute;top:0;height:100%;opacity:0.85;}
  .bar-center{position:absolute;left:50%;top:-1px;width:1px;height:8px;background:#2a4060;}
  .arrow-col{color:#2a4a6a;font-size:12px;text-align:center;}
  .corr-info{margin-top:24px;padding:14px 16px;background:rgba(0,170,255,0.04);border:1px solid #1a2535;border-radius:3px;color:#4a6080;font-size:11px;line-height:1.7;}
  /* heatmap */
  .heat-grid{overflow-x:auto;}
  .heat-row{display:grid;gap:2px;margin-bottom:3px;}
  .heat-cell{border-radius:2px;display:flex;align-items:center;justify-content:center;cursor:default;}
  .heat-cell:hover{outline:1px solid #ffffff44;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeIn 0.3s ease;}
  input[type=range]{accent-color:#00d4ff;}
  input[type=datetime-local]{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:#e0eaf8;font-family:'JetBrains Mono','Fira Mono',monospace;font-size:12px;padding:9px 10px;outline:none;transition:border-color 0.2s;color-scheme:dark;}
  input[type=datetime-local]:focus{border-color:#00aaff;}
  .dt-toggle{background:none;border:1px solid #1a2a3a;color:#2a4a6a;font-family:inherit;font-size:11px;padding:9px 11px;border-radius:3px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .dt-toggle:hover{border-color:#0077cc;color:#7dd3fc;}
  .dt-toggle.active{border-color:#0066aa;color:#38bdf8;background:rgba(0,100,200,0.1);}
  .dt-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .io-btn{background:none;border:1px solid #1e3050;color:#3a6080;font-family:inherit;font-size:11px;letter-spacing:0.06em;padding:4px 12px;border-radius:3px;cursor:pointer;transition:all 0.2s;}
  .io-btn:hover{border-color:#0077cc;color:#7dd3fc;background:rgba(0,120,200,0.08);}
  .io-btn.flash-green{border-color:#00ff9d;color:#00ff9d;}
  .io-btn.flash-red{border-color:#ff4d6d;color:#ff4d6d;}
  /* role badges & buttons */
  .role-badge{display:inline-block;border-radius:2px;padding:1px 6px;font-size:10px;letter-spacing:0.06em;font-weight:600;vertical-align:middle;margin-left:3px;}
  .role-cause{background:rgba(255,180,0,0.12);border:1px solid rgba(255,180,0,0.3);color:#ffd060;}
  .role-effect{background:rgba(255,80,100,0.12);border:1px solid rgba(255,80,100,0.3);color:#ff8fa3;}
  .role-both{background:rgba(140,80,255,0.12);border:1px solid rgba(140,80,255,0.3);color:#c4a0ff;}
  .role-none{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#4a6080;}
  .role-btn{background:none;border:1px solid #1a2535;border-radius:2px;font-family:inherit;font-size:10px;padding:1px 7px;cursor:pointer;transition:all 0.15s;color:#3a5070;}
  .role-btn:hover{border-color:#4a6080;color:#a0c0e0;}
  .role-btn.active-cause{background:rgba(255,180,0,0.15);border-color:rgba(255,180,0,0.5);color:#ffd060;}
  .role-btn.active-effect{background:rgba(255,80,100,0.15);border-color:rgba(255,80,100,0.5);color:#ff8fa3;}
  .role-btn.active-both{background:rgba(140,80,255,0.15);border-color:rgba(140,80,255,0.5);color:#c4a0ff;}
  /* inline role picker shown after logging */
  .role-picker-row{display:flex;align-items:center;gap:8px;padding:5px 10px;background:rgba(0,0,0,0.2);border-left:2px solid #1a3050;border-radius:0 3px 3px 0;margin-bottom:3px;flex-wrap:wrap;}
  .role-picker-tag{color:#7dd3fc;font-size:11px;min-width:80px;}
  /* tags manager */
  .tags-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-left:2px solid #1a2535;margin-bottom:4px;border-radius:0 3px 3px 0;transition:background 0.15s;}
  .tags-row:hover{background:rgba(255,255,255,0.02);}
  .tags-row-name{flex:1;color:#c8d4e8;font-size:12px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="logo">◈ CORRELdiary</span>
    <span class="subtitle">v1.3 — personal pattern tracker</span>
    <span class="stats" id="stats">0 entries · 0 tags</span>
    <div style="display:flex;gap:6px;margin-left:16px">
      <button class="io-btn" onclick="exportData()" title="Export all entries to a JSON backup file">↑ export</button>
      <button class="io-btn" onclick="document.getElementById('import-file').click()" title="Import entries from a previously exported JSON file">↓ import</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)"/>
    </div>
  </div>
  <div id="import-toast" style="display:none;position:fixed;top:16px;right:20px;background:#003d6b;border:1px solid #0077cc;color:#7dd3fc;font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 18px;border-radius:3px;z-index:100;transition:opacity 0.4s"></div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchView('log')">log</button>
    <button class="nav-btn" onclick="switchView('correlations')">correlations</button>
    <button class="nav-btn" onclick="switchView('heatmap')">heatmap</button>
    <button class="nav-btn" onclick="switchView('tags')">tags</button>
  </div>
</div>

<div class="main">
  <!-- LOG VIEW -->
  <div id="view-log">
    <div class="section-label">— log entry —</div>
    <div class="input-row">
      <input class="input-field" id="entry-input" placeholder="e.g.  coffee, meditation  or  headache  or  apple, bread, stressed" onkeydown="if(event.key==='Enter')addEntry()"/>
      <button class="log-btn" id="log-btn" onclick="addEntry()">+ LOG</button>
    </div>
    <div class="dt-wrap">
      <button class="dt-toggle" id="dt-toggle-btn" onclick="toggleDatePicker()" title="Set a custom date/time for this entry">⏱ custom time</button>
      <input type="datetime-local" id="entry-dt" style="display:none" title="Leave blank to use current time"/>
      <span id="dt-hint" style="display:none;color:#2a6a4a;font-size:11px"></span>
    </div>
    <div class="chips" id="suggest-chips"></div>
    <div id="inline-role-picker" style="display:none;margin-bottom:16px;padding:10px 12px;background:rgba(0,60,100,0.08);border:1px solid #1a3050;border-radius:3px"></div>
    <div class="filter-section" id="filter-section" style="display:none">
      <div class="section-label">— filter by tag —</div>
      <div id="filter-tags"></div>
    </div>
    <div id="entries-list"></div>
  </div>

  <!-- CORRELATIONS VIEW -->
  <div id="view-correlations" style="display:none">
    <div class="section-label">— pairwise correlations (phi coefficient, per day) —</div>
    <div id="corr-content"></div>
  </div>

  <!-- HEATMAP VIEW -->
  <div id="view-heatmap" style="display:none">
    <div class="section-label">— time-of-day heatmap (top 12 tags) —</div>
    <div id="heatmap-content"></div>
  </div>

  <!-- TAGS VIEW -->
  <div id="view-tags" style="display:none">
    <div class="section-label">— tag roles — used to filter correlations —</div>
    <div id="tags-content"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'correlation-diary-entries';
const ROLES_KEY   = 'correlation-diary-roles';
const SAMPLE_TAGS = ['coffee','alcohol','exercise','meditation','good sleep','poor sleep','stress','sugar','headache','energy high','brain fog','anxiety','productive','tired'];

let entries = [];
let tagRoles = {}; // { tagName: 'cause'|'effect'|'both' }  — unset = no role
let currentView = 'log';
let filterTag = '';
let corrMin = 0;
let corrSort = {col:'phi', dir:'desc'};
let corrSearch = '';
let pendingRoleTags = []; // tags from the most recent entry waiting for role assignment

// Load
try { const r = localStorage.getItem(STORAGE_KEY); if(r) entries = JSON.parse(r); } catch{}
try { const r = localStorage.getItem(ROLES_KEY);   if(r) tagRoles = JSON.parse(r); } catch{}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch{}
  try { localStorage.setItem(ROLES_KEY,   JSON.stringify(tagRoles)); } catch{}
}

function setRole(tag, role) {
  // Toggle off if clicking same role
  if(tagRoles[tag] === role) delete tagRoles[tag];
  else tagRoles[tag] = role;
  save();
  // Re-render whatever is currently showing, plus refresh inline picker if visible
  const picker = document.getElementById('inline-role-picker');
  if(picker) renderInlineRolePicker(pendingRoleTags);
  if(currentView==='tags') renderTags();
  if(currentView==='correlations') renderCorrelations();
  // refresh tag pills in log to show updated badges
  if(currentView==='log') renderLog();
}

function roleLabel(tag) {
  const r = tagRoles[tag];
  if(!r) return '';
  if(r==='cause')  return '<span class="role-badge role-cause">C</span>';
  if(r==='effect') return '<span class="role-badge role-effect">E</span>';
  if(r==='both')   return '<span class="role-badge role-both">~</span>';
  return '';
}

function roleBtns(tag, context) {
  // context: 'inline' | 'tags'
  const r = tagRoles[tag]||'';
  return `
    <button class="role-btn ${r==='cause'?'active-cause':''}"  onclick="setRole('${escHtml(tag)}','cause')"  title="Cause — can drive effects">C</button>
    <button class="role-btn ${r==='effect'?'active-effect':''}" onclick="setRole('${escHtml(tag)}','effect')" title="Effect — result of causes">E</button>
    <button class="role-btn ${r==='both'?'active-both':''}"   onclick="setRole('${escHtml(tag)}','both')"   title="Both — can be either">~</button>
  `;
}

function parseText(t) {
  return t.split(/[,;]+/).map(s=>s.trim().toLowerCase()).filter(Boolean);
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function getHour(iso){ return new Date(iso).getHours(); }

function allTags() {
  return [...new Set(entries.flatMap(e=>e.tags))].sort();
}

function switchView(v) {
  currentView = v;
  ['log','correlations','heatmap','tags'].forEach(x=>{
    document.getElementById('view-'+x).style.display = x===v?'block':'none';
    document.querySelectorAll('.nav-btn').forEach((b,i)=>{
      b.classList.toggle('active', ['log','correlations','heatmap','tags'][i]===v);
    });
  });
  render();
}

function toggleDatePicker() {
  const dtInput = document.getElementById('entry-dt');
  const btn = document.getElementById('dt-toggle-btn');
  const hint = document.getElementById('dt-hint');
  const isOpen = dtInput.style.display !== 'none';
  if(isOpen) {
    dtInput.style.display = 'none';
    dtInput.value = '';
    btn.classList.remove('active');
    btn.textContent = '⏱ custom time';
    hint.style.display = 'none';
  } else {
    // Pre-fill with current local time
    const now = new Date();
    now.setSeconds(0,0);
    dtInput.value = toLocalDatetimeValue(now);
    dtInput.style.display = 'inline-block';
    btn.classList.add('active');
    btn.textContent = '⏱ custom time ✓';
    hint.style.display = 'inline';
    hint.textContent = '← using this time';
    dtInput.focus();
  }
}

function toLocalDatetimeValue(d) {
  // Returns "YYYY-MM-DDTHH:MM" in local time for datetime-local input
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function addEntry() {
  const inp = document.getElementById('entry-input');
  const tags = parseText(inp.value);
  if(!tags.length) return;

  const dtInput = document.getElementById('entry-dt');
  let timestamp;
  if(dtInput.style.display !== 'none' && dtInput.value) {
    timestamp = new Date(dtInput.value).toISOString();
  } else {
    timestamp = new Date().toISOString();
  }

  entries.unshift({id: Date.now().toString(), timestamp, tags, raw: inp.value.trim()});
  entries.sort((a,b) => b.timestamp.localeCompare(a.timestamp));
  inp.value = '';

  // Find tags that have no role yet — prompt inline
  pendingRoleTags = tags.filter(t => !tagRoles[t]);

  // Reset datetime picker
  dtInput.style.display = 'none';
  dtInput.value = '';
  document.getElementById('dt-toggle-btn').classList.remove('active');
  document.getElementById('dt-toggle-btn').textContent = '⏱ custom time';
  document.getElementById('dt-hint').style.display = 'none';

  save();
  const btn = document.getElementById('log-btn');
  btn.textContent = '✓ logged';
  btn.classList.add('flash');
  setTimeout(()=>{btn.textContent='+ LOG';btn.classList.remove('flash');},600);
  render();
  // After render, inject inline picker if there are unassigned tags
  if(pendingRoleTags.length) renderInlineRolePicker(pendingRoleTags);
}

function renderInlineRolePicker(tags) {
  const container = document.getElementById('inline-role-picker');
  if(!container) return;
  const unassigned = tags.filter(t => !tagRoles[t]);
  if(!unassigned.length) { container.style.display='none'; return; }
  container.style.display = 'block';
  container.innerHTML = `
    <div style="color:#2a5070;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">— assign roles to new tags —</div>
    ${unassigned.map(t=>`
      <div class="role-picker-row">
        <span class="role-picker-tag">${escHtml(t)}</span>
        ${roleBtns(t,'inline')}
        <span style="color:#2a4060;font-size:10px;margin-left:4px">${tagRoles[t]?'✓':''}</span>
      </div>
    `).join('')}
    <div style="margin-top:6px">
      <button class="io-btn" onclick="document.getElementById('inline-role-picker').style.display='none'" style="font-size:10px;padding:3px 10px">dismiss</button>
      <span style="color:#2a4060;font-size:10px;margin-left:8px">unassigned tags treated as "both" in correlations</span>
    </div>
  `;
}

function deleteEntry(id) {
  entries = entries.filter(e=>e.id!==id);
  save(); render();
}

function startEdit(id) {
  const e = entries.find(x=>x.id===id);
  if(!e) return;
  const row = document.getElementById('entry-tags-'+id);
  const dtVal = toLocalDatetimeValue(new Date(e.timestamp));
  row.innerHTML = `<div class="edit-row" style="flex-wrap:wrap;gap:6px">
    <input class="input-field" id="edit-inp-${id}" style="font-size:12px;padding:5px 10px;min-width:200px;flex:1" value="${escHtml(e.raw||e.tags.join(', '))}"/>
    <input type="datetime-local" id="edit-dt-${id}" value="${dtVal}" title="Edit date/time" style="flex-shrink:0"/>
    <button class="save-btn" onclick="saveEdit('${id}')">save</button>
    <button class="del-btn" onclick="cancelEdit('${id}')">✕</button>
  </div>`;
  const inp = document.getElementById('edit-inp-'+id);
  inp.focus();
  inp.onkeydown = ev => { if(ev.key==='Enter') saveEdit(id); if(ev.key==='Escape') cancelEdit(id); };
}

function saveEdit(id) {
  const inp = document.getElementById('edit-inp-'+id);
  const dtInp = document.getElementById('edit-dt-'+id);
  if(!inp) return;
  const tags = parseText(inp.value);
  if(!tags.length) return;
  const newTimestamp = (dtInp && dtInp.value) ? new Date(dtInp.value).toISOString() : undefined;
  entries = entries.map(e => e.id===id ? {...e, tags, raw:inp.value.trim(), ...(newTimestamp ? {timestamp: newTimestamp} : {})} : e);
  // Re-sort in case timestamp changed
  entries.sort((a,b) => b.timestamp.localeCompare(a.timestamp));
  save(); render();
}

function cancelEdit(id) { render(); }

function setFilter(t) {
  filterTag = filterTag===t?'':t;
  render();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function phiColor(phi) {
  if(phi>0.5) return '#00ff9d';
  if(phi>0.2) return '#7affcc';
  if(phi<-0.5) return '#ff4d6d';
  if(phi<-0.2) return '#ff8fa3';
  return '#8892a4';
}

function canBeCause(tag) {
  const r = tagRoles[tag];
  return !r || r==='cause' || r==='both';
}
function canBeEffect(tag) {
  const r = tagRoles[tag];
  return !r || r==='effect' || r==='both';
}

function computeCorrelations() {
  const byDate = {};
  for(const e of entries){
    const day = e.timestamp.slice(0,10);
    const ms = new Date(e.timestamp).getTime();
    if(!byDate[day]) byDate[day] = {};
    for(const t of e.tags){
      if(byDate[day][t] === undefined || ms < byDate[day][t]){
        byDate[day][t] = ms;
      }
    }
  }

  const days = Object.keys(byDate);
  const tags = [...new Set(entries.flatMap(e=>e.tags))];
  if(tags.length < 2 || days.length < 2) return [];

  const results = [];
  for(let i=0;i<tags.length;i++){
    for(let j=0;j<tags.length;j++){
      if(i===j) continue;
      const a=tags[i], b=tags[j];
      // Role filter: a must be a valid cause, b must be a valid effect
      if(!canBeCause(a) || !canBeEffect(b)) continue;
      let n11=0, n10=0, n01=0, n00=0;
      for(const day of days){
        const tA = byDate[day][a];
        const tB = byDate[day][b];
        const aPresent = tA !== undefined;
        const bAfterA  = tA !== undefined && tB !== undefined && tB > tA;
        const bPresent = tB !== undefined;
        if(aPresent && bAfterA)        n11++;
        else if(aPresent && !bAfterA)  n10++;
        else if(!aPresent && bPresent) n01++;
        else                           n00++;
      }
      const denom = Math.sqrt((n11+n10)*(n01+n00)*(n11+n01)*(n10+n00));
      if(!denom) continue;
      const phi = (n11*n00 - n10*n01) / denom;
      results.push({a, b, phi, coOccurrences:n11});
    }
  }
  return results.sort((x,y)=>Math.abs(y.phi)-Math.abs(x.phi));
}

function render() {
  document.getElementById('stats').textContent = `${entries.length} entries · ${allTags().length} tags`;
  if(currentView==='log') renderLog();
  else if(currentView==='correlations') renderCorrelations();
  else if(currentView==='heatmap') renderHeatmap();
  else if(currentView==='tags') renderTags();
}

function renderLog() {
  // suggest chips
  const chips = document.getElementById('suggest-chips');
  chips.innerHTML = SAMPLE_TAGS.map(t=>`<span class="suggest-chip" onclick="appendChip('${t}')">${t}</span>`).join('');

  const tags = allTags();
  const fs = document.getElementById('filter-section');
  const ft = document.getElementById('filter-tags');
  if(tags.length>0){
    fs.style.display='block';
    ft.innerHTML = `<span class="tag-pill ${!filterTag?'active':''}" onclick="setFilter('')">all</span>`
      + tags.map(t=>`<span class="tag-pill ${filterTag===t?'active':''}" onclick="setFilter('${escHtml(t)}')">${escHtml(t)}</span>`).join('');
  } else { fs.style.display='none'; }

  const filtered = filterTag ? entries.filter(e=>e.tags.includes(filterTag)) : entries;

  // group by day
  const groups = {};
  for(const e of filtered){
    const day=e.timestamp.slice(0,10);
    if(!groups[day]) groups[day]=[];
    groups[day].push(e);
  }
  const sortedDays = Object.entries(groups).sort(([a],[b])=>b.localeCompare(a));

  const el = document.getElementById('entries-list');
  if(sortedDays.length===0){
    el.innerHTML = '<div class="empty">No entries yet. Start logging above.</div>';
    return;
  }

  el.innerHTML = sortedDays.map(([day,dayEntries])=>`
    <div style="margin-bottom:20px">
      <div class="day-header">
        <span style="color:#00aaff">${formatDate(day+'T12:00:00')}</span>
        <span class="day-line"></span>
        <span>${dayEntries.length} entr${dayEntries.length===1?'y':'ies'}</span>
      </div>
      ${dayEntries.map(e=>`
        <div class="entry-row fade-in">
          <span class="entry-time">${formatTime(e.timestamp)}</span>
          <div class="entry-tags" id="entry-tags-${e.id}">
            ${e.tags.map(t=>`<span class="tag-pill ${filterTag===t?'active':''}" onclick="setFilter('${escHtml(t)}')">${escHtml(t)}${roleLabel(t)}</span>`).join('')}
          </div>
          <div class="entry-actions">
            <button class="edit-btn" onclick="startEdit('${e.id}')">✎</button>
            <button class="del-btn" onclick="deleteEntry('${e.id}')">✕</button>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function appendChip(t) {
  const inp = document.getElementById('entry-input');
  inp.value = inp.value ? inp.value + ', ' + t : t;
  inp.focus();
}

function renderTags() {
  const el = document.getElementById('tags-content');
  const tags = allTags();
  if(!tags.length){ el.innerHTML='<div class="empty">No tags yet. Start logging to create tags.</div>'; return; }

  const counts = {};
  for(const e of entries) for(const t of e.tags) counts[t]=(counts[t]||0)+1;

  const roleOrder = {cause:0, both:1, effect:2, undefined:3};
  const sorted = [...tags].sort((a,b)=>{
    const ra = roleOrder[tagRoles[a]] ?? 3;
    const rb = roleOrder[tagRoles[b]] ?? 3;
    if(ra!==rb) return ra-rb;
    return a.localeCompare(b);
  });

  el.innerHTML = `
    <div style="color:#2a4060;font-size:11px;line-height:1.8;margin-bottom:16px">
      Set each tag's role. Only <span class="role-badge role-cause">C</span> cause/both tags appear as the left side of correlations,
      and only <span class="role-badge role-effect">E</span> effect/both tags appear on the right.
      Unset tags are treated as <span class="role-badge role-both">~</span> both.
    </div>
    <div style="display:grid;grid-template-columns:10px 1fr auto auto;gap:8px;padding:5px 10px;color:#2a4060;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid #1a2535;margin-bottom:4px">
      <span></span><span>tag</span><span style="text-align:right;padding-right:8px">uses</span><span>role</span>
    </div>
    ${sorted.map(t=>{
      const r = tagRoles[t];
      const dot = r==='cause'?'#ffd060':r==='effect'?'#ff8fa3':r==='both'?'#c4a0ff':'#2a3a55';
      return `<div class="tags-row">
        <span style="width:6px;height:6px;border-radius:50%;background:${dot};display:inline-block;flex-shrink:0"></span>
        <span class="tags-row-name">${escHtml(t)}${roleLabel(t)}</span>
        <span style="color:#2a4060;font-size:11px;text-align:right;padding-right:16px">${counts[t]||0}×</span>
        <span style="display:flex;gap:4px">${roleBtns(t,'tags')}</span>
      </div>`;
    }).join('')}
    <div style="margin-top:20px;padding:12px 14px;background:rgba(0,170,255,0.03);border:1px solid #1a2535;border-radius:3px;color:#3a5570;font-size:11px;line-height:1.8">
      <strong style="color:#4a7090">Legend:</strong>
      <span class="role-badge role-cause">C</span> Cause — can be the left side of a correlation (e.g. coffee, stress) ·
      <span class="role-badge role-effect">E</span> Effect — can be the right side (e.g. headache, energy high) ·
      <span class="role-badge role-both">~</span> Both — appears on either side ·
      unset = treated as both
    </div>
  `;
}

function sortCorrs(corrs) {
  const {col, dir} = corrSort;
  return [...corrs].sort((x,y)=>{
    let av, bv;
    if(col==='phi'){ av=Math.abs(x.phi); bv=Math.abs(y.phi); }
    else if(col==='a'){ av=x.a; bv=y.a; }
    else if(col==='b'){ av=x.b; bv=y.b; }
    else { av=x.coOccurrences; bv=y.coOccurrences; }
    if(av<bv) return dir==='asc'?-1:1;
    if(av>bv) return dir==='asc'?1:-1;
    return 0;
  });
}

function setSort(col) {
  if(corrSort.col===col){ corrSort.dir = corrSort.dir==='desc'?'asc':'desc'; }
  else { corrSort = {col, dir: col==='a'||col==='b' ? 'asc' : 'desc'}; }
  renderCorrelations();
}

function renderCorrelations() {
  const el = document.getElementById('corr-content');
  if(entries.length < 4){
    el.innerHTML = '<div class="empty">Log at least a few days of entries across multiple tags to see correlations.</div>';
    return;
  }

  const allCorrs = computeCorrelations();
  const arrow = col => {
    if(corrSort.col!==col) return '<span style="color:#1a2a3a">↕</span>';
    return corrSort.dir==='desc'?'↓':'↑';
  };

  // Apply filters
  let visible = allCorrs.filter(c => {
    if(Math.abs(c.phi) < corrMin) return false;
    if(corrSearch){
      const s = corrSearch.toLowerCase();
      if(!c.a.includes(s) && !c.b.includes(s)) return false;
    }
    return true;
  });
  visible = sortCorrs(visible);

  el.innerHTML = `
    <div class="corr-controls">
      <span style="color:#4a6080;font-size:11px">min |φ|</span>
      <input type="range" min="0" max="100" value="${corrMin*100}"
        oninput="corrMin=this.value/100;document.getElementById('corr-min-val').textContent=corrMin.toFixed(2);renderCorrelations()"
        style="width:110px"/>
      <span id="corr-min-val" style="color:#7dd3fc;font-size:11px;min-width:28px">${corrMin.toFixed(2)}</span>
      <input class="corr-search" placeholder="🔍 filter by tag…" value="${escHtml(corrSearch)}"
        oninput="corrSearch=this.value;renderCorrelations()"/>
      <span style="color:#2a4060;font-size:11px;margin-left:4px">${visible.length} pair${visible.length===1?'':'s'}</span>
    </div>
    <div class="corr-table">
      <div class="corr-header corr-cols corr-row">
        <span onclick="setSort('a')" class="${corrSort.col==='a'?'sort-active':''}">cause ${arrow('a')}</span>
        <span></span>
        <span onclick="setSort('b')" class="${corrSort.col==='b'?'sort-active':''}">effect ${arrow('b')}</span>
        <span onclick="setSort('phi')" class="${corrSort.col==='phi'?'sort-active':''}">φ strength ${arrow('phi')}</span>
        <span>correlation bar</span>
        <span onclick="setSort('n')" class="${corrSort.col==='n'?'sort-active':''}">days ${arrow('n')}</span>
      </div>
      ${visible.length===0
        ? '<div class="empty" style="padding:30px 10px">No pairs match the current filters.</div>'
        : visible.slice(0,120).map(({a,b,phi,coOccurrences})=>{
          const col = phiColor(phi);
          const barLeft = phi>=0 ? 50 : 50+phi*50;
          const barW = Math.abs(phi)*50;
          return `<div class="corr-row corr-cols">
            <span class="tag-pill" style="cursor:default;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block" title="${escHtml(a)}">${escHtml(a)}</span>
            <span class="arrow-col">→</span>
            <span class="tag-pill" style="cursor:default;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block" title="${escHtml(b)}">${escHtml(b)}</span>
            <span class="phi-val" style="color:${col}">${phi>0?'+':''}${phi.toFixed(3)}</span>
            <div class="bar-wrap">
              <div class="bar-bg"></div>
              <div class="bar-fill" style="background:${col};left:${barLeft}%;width:${barW}%"></div>
              <div class="bar-center"></div>
            </div>
            <span style="color:#4a6080;font-size:11px;text-align:right">${coOccurrences}d</span>
          </div>`;
        }).join('')
      }
    </div>
    <div class="corr-info">
      <span style="color:#00d4ff">Directional φ</span>: each row shows <em>cause → effect</em> — only days where the cause was logged <strong>before</strong> the effect count toward the score.
      <span style="color:#00ff9d">+1.0</span> = cause always precedes effect ·
      <span style="color:#ff4d6d">−1.0</span> = cause never precedes effect ·
      <span style="color:#8892a4">0</span> = no pattern.
      Days are the unit — multiple logs per day use the earliest timestamp per tag.
    </div>
  `;
}

function renderHeatmap() {
  const el = document.getElementById('heatmap-content');
  const tags = allTags().slice(0,12);
  if(tags.length===0){
    el.innerHTML='<div class="empty">Log some entries first.</div>';
    return;
  }
  const grid = {};
  for(const t of tags) grid[t]=Array(24).fill(0);
  for(const e of entries){
    const h=getHour(e.timestamp);
    for(const t of e.tags) if(grid[t]) grid[t][h]++;
  }
  let maxH=1;
  for(const row of Object.values(grid)) for(const v of row) if(v>maxH) maxH=v;

  const cols = '120px '+Array(24).fill('28px').join(' ');

  const hourLabels = Array.from({length:24},(_,h)=>
    `<div style="color:#2a3a55;font-size:10px;text-align:center">${h%4===0?h+'h':''}</div>`
  ).join('');
  const hourNums = Array.from({length:24},(_,h)=>
    `<div style="color:#2a3a55;font-size:9px;text-align:center">${h}</div>`
  ).join('');

  const rows = tags.map(tag=>{
    const cells = grid[tag].map((val,h)=>{
      const intensity=val/maxH;
      const bg=val===0?'#0d1420':`rgba(0,${Math.round(120+intensity*135)},${Math.round(180+intensity*75)},${(0.15+intensity*0.85).toFixed(2)})`;
      const txt=val>0?`<span style="font-size:9px;color:${intensity>0.5?'#fff':'#7dd3fc'};opacity:0.9">${val}</span>`:'';
      return `<div class="heat-cell" title="${escHtml(tag)} @ ${h}:00 — ${val} time(s)" style="width:28px;height:22px;background:${bg}">${txt}</div>`;
    }).join('');
    return `<div class="heat-row" style="display:grid;grid-template-columns:${cols};gap:2px">
      <div style="color:#7dd3fc;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;line-height:22px">${escHtml(tag)}</div>
      ${cells}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="heat-grid">
      <div style="display:grid;grid-template-columns:${cols};gap:2px;margin-bottom:4px">
        <div></div>${hourLabels}
      </div>
      ${rows}
      <div style="display:grid;grid-template-columns:${cols};gap:2px;margin-top:8px">
        <div></div>${hourNums}
      </div>
      <div style="margin-top:20px;color:#2a3a55;font-size:11px">Showing frequency of each tag by hour of day. Hover cells for details.</div>
    </div>
  `;
}

// ── Export ──────────────────────────────────────────────
function exportData() {
  const payload = {
    version: 2,
    exportedAt: new Date().toISOString(),
    entries: entries,
    tagRoles: tagRoles
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `correl-diary-backup-${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✓ exported ${entries.length} entries`, 'green');
}

// ── Import ──────────────────────────────────────────────
function importData(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      // Accept both {version,entries:[]} and raw array formats
      const incoming = Array.isArray(data) ? data : (data.entries || []);
      if(!Array.isArray(incoming)) throw new Error('Invalid format');
      const valid = incoming.filter(x => x.id && x.timestamp && Array.isArray(x.tags));
      if(valid.length === 0) { showToast('✕ no valid entries found', 'red'); return; }
      const existingIds = new Set(entries.map(x=>x.id));
      const newEntries = valid.filter(x=>!existingIds.has(x.id));
      const merged = [...entries, ...newEntries].sort((a,b)=>b.timestamp.localeCompare(a.timestamp));
      entries = merged;
      // Merge tagRoles if present in backup
      if(data.tagRoles && typeof data.tagRoles==='object'){
        tagRoles = {...data.tagRoles, ...tagRoles}; // existing roles take priority
      }
      save();
      render();
      showToast(`✓ imported ${newEntries.length} new entries (${valid.length - newEntries.length} duplicates skipped)`, 'green');
    } catch(err) {
      showToast('✕ could not read file — make sure it\'s a CORRELdiary export', 'red');
    }
    // Reset file input so the same file can be re-imported if needed
    event.target.value = '';
  };
  reader.readAsText(file);
}

function showToast(msg, type) {
  const t = document.getElementById('import-toast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.opacity = '1';
  t.style.borderColor = type==='green' ? '#00ff9d' : '#ff4d6d';
  t.style.color = type==='green' ? '#00ff9d' : '#ff4d6d';
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.style.display='none', 400); }, 3000);
}

// init
render();
</script>
